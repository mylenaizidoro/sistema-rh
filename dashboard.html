<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard RH - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: #ffffff; border-radius: 16px; padding: 30px; max-width: 950px; margin: 25px auto; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .grid-info { display: grid; grid-template-columns: 1fr 280px; gap: 25px; align-items: center; }
        .info-box { background: #f1f5f9; padding: 20px; border-radius: 12px; border-left: 5px solid #0284c7; font-size: 0.9rem; line-height: 1.6; color: #475569; }
        .info-box b { color: #0284c7; display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 0.8rem; }
        h1 { color: #0f172a; font-weight: 700; text-align: center; margin-bottom: 30px; text-transform: uppercase; }
        h2 { color: #0284c7; margin: 0; font-size: 1.4rem; text-transform: uppercase; }
        .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 25px; }
        .chart-container { position: relative; height: 420px; width: 100%; }
        .back-btn { color: #64748b; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 20px; }
        @media (max-width: 768px) { .grid-info { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div style="max-width: 950px; margin: auto;">
        <a href="index.html" class="back-btn">← Voltar para perfis</a>
        <h1>GESTÃO DE INDICADORES - DHO CURITIBA</h1>
    </div>
    <div id="container-graficos"></div>

<script>
    Chart.register(ChartDataLabels);

    const planilhaDrive = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?output=csv";

    function limparNumero(v) {
        if (!v || v.toString().trim() === "") return 0;
        let n = v.toString().replace(/\s/g, '').replace(',', '.');
        return parseFloat(n) || 0;
    }

    function normalizar(txt) {
        return txt ? txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : "";
    }

    function criarGraficoCombinado(titulo, dadosMOD, dadosMOI) {
        const container = document.getElementById('container-graficos');
        const idUnique = Math.random().toString(36).substr(2, 9);
        
        container.innerHTML += `
            <div class="card">
                <h2>${titulo}</h2>
                <p class="sub">Grupo Coplac | Visão Consolidada MOD + MOI</p>
                <div class="grid-info">
                    <div class="chart-container">
                        <canvas id="chart-${idUnique}"></canvas>
                    </div>
                    <div class="info-box">
                        <b>MOD + MOI</b>
                        Soma das solicitações de desligamento em 15 dias para Mão de Obra Direta (MOD) e Indireta (MOI).
                    </div>
                </div>
            </div>`;
        
        setTimeout(() => {
            const ctx = document.getElementById(`chart-${idUnique}`);
            const labels = [...new Set([...dadosMOD.map(d => d.mes), ...dadosMOI.map(d => d.mes)])];
            
            const valoresMOD = labels.map(mes => {
                const r = dadosMOD.find(ln => ln.mes === mes);
                return r ? limparNumero(r['Valor Real']) : 0;
            });

            const valoresMOI = labels.map(mes => {
                const r = dadosMOI.find(ln => ln.mes === mes);
                return r ? limparNumero(r['Valor Real']) : 0;
            });

            // Meta consolidada (Ex: 3 + 6 = 9)
            const metaCombinada = labels.map(mes => {
                const rMOD = dadosMOD.find(ln => ln.mes === mes);
                const rMOI = dadosMOI.find(ln => ln.mes === mes);
                return (rMOD ? limparNumero(rMOD.Objetivo) : 0) + (rMOI ? limparNumero(rMOI.Objetivo) : 0);
            });

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'MOI (Solicitação)',
                            data: valoresMOI,
                            backgroundColor: '#cbd5e1', // Cinza Claro
                            stack: 'stack0',
                            borderRadius: { topLeft: 6, topRight: 6 }
                        },
                        {
                            label: 'MOD (Solicitação)',
                            data: valoresMOD,
                            backgroundColor: '#475569', // Cinza Escuro
                            stack: 'stack0'
                        },
                        {
                            label: 'Meta Total',
                            data: metaCombinada,
                            type: 'line',
                            borderColor: '#0f172a',
                            borderWidth: 2,
                            pointStyle: 'circle',
                            pointBackgroundColor: '#ffffff',
                            pointRadius: 5,
                            fill: false,
                            datalabels: { display: false }
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' },
                        datalabels: {
                            color: '#1e293b',
                            font: { weight: 'bold' },
                            formatter: (value, context) => {
                                // Mostra o valor de cada parte e o total no topo
                                if (context.datasetIndex === 0) { // No topo da pilha (MOI)
                                    const total = valoresMOD[context.dataIndex] + valoresMOI[context.dataIndex];
                                    return total > 0 ? total : '';
                                }
                                return value > 0 ? value : '';
                            },
                            anchor: 'end',
                            align: 'top'
                        }
                    },
                    scales: {
                        x: { stacked: true, grid: { display: false } },
                        y: { stacked: true, beginAtZero: true, grace: '15%' }
                    }
                }
            });
        }, 150);
    }

    Papa.parse(planilhaDrive + "&t=" + new Date().getTime(), {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            document.getElementById('container-graficos').innerHTML = "";

            // Filtra os dois conjuntos de dados
            const dadosMOD = dados.filter(ln => normalizar(ln.Processo).includes("SOLICITACAO") && normalizar(ln.Indicador).includes("PEDIDO"));
            const dadosMOI = dados.filter(ln => normalizar(ln.Processo).includes("TURNOVER_MOI"));

            if (dadosMOD.length > 0 || dadosMOI.length > 0) {
                criarGraficoCombinado("TURNOVER - SOLICITAÇÃO DE DESLIGAMENTO 15 DIAS (CONSOLIDADO)", dadosMOD, dadosMOI);
            }
            
            // Aqui você pode manter os outros gráficos individuais se desejar
        }
    });
</script>
</body>
</html>
