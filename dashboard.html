<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard DHO - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0f172a; 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif; 
            padding: 20px; 
            margin: 0;
        }
        .card { 
            background: #1e293b; 
            border-radius: 15px; 
            padding: 25px; 
            max-width: 900px; 
            margin: 40px auto; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        h2 { color: #38bdf8; margin: 0; font-size: 1.8rem; }
        .sub { color: #94a3b8; margin-bottom: 30px; font-size: 0.95rem; }
        .chart-container { position: relative; height: 450px; width: 100%; }
        .back-btn { 
            color: #94a3b8; 
            text-decoration: none; 
            font-size: 0.9rem; 
            display: inline-block; 
            margin-bottom: 20px;
            transition: color 0.2s;
        }
        .back-btn:hover { color: #38bdf8; }
    </style>
</head>
<body>

<div class="card">
    <a href="index.html" class="back-btn">← Voltar para perfis</a>
    
    <h2>Indicadores de DHO</h2>
    <p class="sub">Ada — Treinamento e Desenvolvimento | Grupo Coplac</p>
    
    <div class="chart-container">
        <canvas id="graficoDHO"></canvas>
    </div>
</div>

<script>
    // IMPORTANTE: O nome do arquivo no GitHub deve ser dados.csv
    const csvUrl = 'dados.csv';

    // Função para limpar e converter valores do Excel
    function limparNumero(valor) {
        if (!valor) return 0;
        // Remove "Horas", "%", espaços e troca vírgula por ponto
        let limpo = valor.toString().replace(/[^\d,.-]/g, '').replace(',', '.');
        return parseFloat(limpo) || 0;
    }

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            
            // Filtro dinâmico para buscar o processo de treinamento
            const treinoData = dados.filter(item => {
                const p = (item.Processo || "").toUpperCase();
                return p.includes("TREINAMENTO");
            });

            if (treinoData.length === 0) {
                console.error("Nenhum dado de 'TREINAMENTO' encontrado no CSV.");
                return;
            }

            const meses = treinoData.map(item => item.Mês);
            const valoresReais = treinoData.map(item => limparNumero(item['Valor Real']));
            const objetivos = treinoData.map(item => limparNumero(item.Objetivo));

            const ctx = document.getElementById('graficoDHO').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: meses,
                    datasets: [
                        {
                            label: 'Horas Realizadas',
                            data: valoresReais,
                            backgroundColor: '#38bdf8',
                            borderRadius: 6,
                            order: 2
                        },
                        {
                            label: 'Meta (Objetivo)',
                            data: objetivos,
                            type: 'line',
                            borderColor: '#ef4444',
                            borderWidth: 3,
                            borderDash: [5, 5],
                            pointRadius: 4,
                            fill: false,
                            order: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#f1f5f9', font: { size: 14 } } }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
        },
        error: function(err) {
            console.error("Erro ao carregar o CSV:", err);
        }
    });
</script>
</body>
</html>
