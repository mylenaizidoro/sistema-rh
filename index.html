<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Core - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card { transition: transform 0.2s; border-bottom: 4px solid #3b82f6; }
        .card:hover { transform: translateY(-5px); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 50; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-slate-900 text-white p-6 hidden md:block">
        <h1 class="text-2xl font-bold text-blue-500 italic mb-10">HR Core</h1>
        <nav class="space-y-4">
            <div class="flex items-center gap-3 p-3 bg-blue-600 rounded-xl cursor-pointer">
                <i class="fas fa-chart-line"></i> <span>Dashboard</span>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Bem-vindo ao Relatório de RH</h2>
                <p class="text-emerald-600 font-semibold text-sm">Dados confidenciais - Acesso restrito</p>
            </div>
            <button onclick="abrirModal()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                <i class="fas fa-plus mr-2"></i> NOVA VAGA
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="card bg-white p-6 rounded-2xl shadow-sm">
                <p class="text-slate-400 text-xs font-bold uppercase mb-1">Vagas Abertas</p>
                <div class="flex items-center justify-between">
                    <h3 class="text-3xl font-bold text-slate-800">12</h3>
                    <span class="bg-emerald-100 text-emerald-600 text-[10px] px-2 py-1 rounded-full font-bold">+2 este mês</span>
                </div>
            </div>
            </div>
    </main>

    <div id="modalVaga" class="modal">
        <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl relative mx-4">
            <button onclick="fecharModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
                <i class="fas fa-times text-xl"></i>
            </button>
            <h3 class="text-xl font-bold text-slate-800 mb-6">Anunciar Nova Oportunidade</h3>
            <form id="formVaga" class="space-y-4" onsubmit="event.preventDefault(); enviarDados();">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Cargo</label>
                    <input type="text" id="campo-cargo" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Setor</label>
                    <select id="campo-setor" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none">
                        <option>Produção</option>
                        <option>Logística</option>
                        <option>Tecnologia</option>
                    </select>
                </div>
                <button type="submit" id="btn-enviar" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-all">
                    PUBLICAR VAGA
                </button>
            </form>
        </div>
    </div>

    <script>
        function abrirModal() { document.getElementById('modalVaga').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modalVaga').style.display = 'none'; }

        async function enviarDados() {
            const btn = document.getElementById('btn-enviar');
            btn.innerText = "Processando...";
            btn.disabled = true;

            // URL DO SEU GOOGLE APPS SCRIPT (Web App)
            const urlAPI = "SUA_URL_AQUI"; 

            const payload = {
                cargo: document.getElementById('campo-cargo').value,
                setor: document.getElementById('campo-setor').value
            };

            try {
                await fetch(urlAPI, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("Vaga cadastrada com sucesso!");
                fecharModal();
                document.getElementById('formVaga').reset();
            } catch (error) {
                alert("Erro ao conectar com o servidor.");
            } finally {
                btn.innerText = "PUBLICAR VAGA";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
