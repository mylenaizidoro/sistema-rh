<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Core - Gestão de Vagas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-item { cursor: pointer; transition: 0.3s; color: #94a3b8; }
        .sidebar-item:hover { background-color: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .active-menu { background-color: #2563eb !important; color: white !important; }
        .hidden { display: none; }
        
        /* Estilos de Status conforme as imagens */
        .badge-aberta { background-color: #f1f5f9; color: #475569; padding: 4px 12px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
        .badge-processo { background-color: #eff6ff; color: #3b82f6; padding: 4px 12px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
        .badge-pausada { background-color: #fef2f2; color: #ef4444; padding: 4px 12px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
        
        tr.vaga-row { border-bottom: 1px solid #f1f5f9; transition: all 0.2s; }
        tr.vaga-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#0a1629] text-white flex flex-col shadow-2xl z-10">
        <div class="p-6 text-2xl font-bold border-b border-slate-700 flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white w-8 h-8 flex items-center justify-center italic">R</div> HR Core
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4 text-sm">
            <div onclick="trocarPagina('dashboard')" id="menu-dashboard" class="sidebar-item p-3 rounded-xl flex items-center gap-3 active-menu">
                <i class="fas fa-th-large w-5 text-center"></i> Command Center
            </div>
            <div class="pt-2">
                <div class="p-3 text-slate-500 uppercase text-[10px] font-bold tracking-widest flex justify-between items-center">
                    Recrutamento <i class="fas fa-chevron-down text-[8px]"></i>
                </div>
                <div onclick="trocarPagina('dashboard')" class="sidebar-item p-3 pl-11 rounded-xl">Dashboard</div>
                <div onclick="trocarPagina('vagas')" id="menu-vagas" class="sidebar-item p-3 pl-11 rounded-xl">Vagas</div>
                <div class="sidebar-item p-3 pl-11 rounded-xl">Pipeline</div>
            </div>
            <div onclick="trocarPagina('triagem')" id="menu-triagem" class="sidebar-item p-3 rounded-xl flex items-center gap-3">
                <i class="fas fa-users w-5 text-center"></i> Triagem
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b flex items-center justify-between px-8 shadow-sm">
            <div class="flex items-center gap-4 bg-slate-50 px-4 py-2 rounded-full border border-slate-100 w-96">
                <i class="fas fa-search text-slate-400 text-sm"></i>
                <input type="text" placeholder="Pesquisar..." class="bg-transparent border-none outline-none text-sm w-full">
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-sm font-bold text-slate-800">Mylena Izidoro</p>
                    <p class="text-[10px] text-slate-400 uppercase font-bold">Diretora de RH</p>
                </div>
                <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold border-2 border-white shadow-sm">MI</div>
            </div>
        </header>

        <div id="pagina-vagas" class="flex-1 overflow-y-auto p-8 hidden">
            <div class="mb-8 flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-bold text-slate-800 mb-2">Gestão de Vagas</h2>
                    <p class="text-slate-500 text-sm">Controle centralizado de todas as oportunidades em aberto.</p>
                </div>
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-blue-200 transition-all flex items-center gap-2">
                    <i class="fas fa-plus"></i> Nova Vaga
                </button>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="p-6 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                    <div class="relative w-1/3">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" placeholder="Pesquisar por cargo ou código..." class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-slate-200 outline-none focus:border-blue-400 text-sm">
                    </div>
                    <button class="flex items-center gap-2 text-slate-600 font-bold text-xs border border-slate-200 px-4 py-2.5 rounded-xl bg-white hover:bg-slate-50">
                        <i class="fas fa-filter"></i> Filtros
                    </button>
                </div>

                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-400 text-[11px] uppercase tracking-wider font-bold">
                            <th class="px-8 py-5">Código</th>
                            <th class="px-4 py-5">Cargo</th>
                            <th class="px-4 py-5">Setor</th>
                            <th class="px-4 py-5">Gestor</th>
                            <th class="px-4 py-5">Contrato</th>
                            <th class="px-4 py-5">Salário</th>
                            <th class="px-4 py-5">Status</th>
                            <th class="px-8 py-5 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-vagas-corpo" class="text-sm text-slate-700">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="pagina-dashboard" class="flex-1 overflow-y-auto p-8">
             <h2 class="text-xl font-bold">Carregando Dashboard...</h2>
        </div>
    </main>

    <script>
        const urlPlanilha = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?gid=1728295734&single=true&output=csv";

        function trocarPagina(pagina) {
            document.getElementById('pagina-vagas').classList.toggle('hidden', pagina !== 'vagas');
            document.getElementById('pagina-dashboard').classList.toggle('hidden', pagina !== 'dashboard');
            
            // Toggle Active Menu
            document.getElementById('menu-vagas').classList.toggle('active-menu', pagina === 'vagas');
            document.getElementById('menu-dashboard').classList.toggle('active-menu', pagina === 'dashboard');
        }

        function carregarDados() {
            Papa.parse(urlPlanilha, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const dados = results.data;
                    // Filtra apenas o que for do tipo "Vagas" na planilha
                    const listaVagas = dados.filter(d => d.Tipo === "Vagas");
                    renderizarTabelaVagas(listaVagas);
                }
            });
        }

        function renderizarTabelaVagas(vagas) {
            const tbody = document.getElementById('tabela-vagas-corpo');
            if (!tbody) return;

            tbody.innerHTML = vagas.map(v => {
                // Lógica para separar os dados caso estejam na mesma coluna 'Valor' separados por '|'
                // Ou se você estiver usando colunas separadas, ajuste v.Setor, v.Gestor etc.
                const info = v.Valor.split('|').map(item => item.trim());
                
                const cargo = info[0] || "Cargo não definido";
                const setor = info[1] || "Geral";
                const gestor = info[2] || "-";
                const contrato = info[3] || "CLT";
                const salario = info[4] || "A combinar";
                const status = (info[5] || "aberta").toLowerCase();

                return `
                    <tr class="vaga-row">
                        <td class="px-8 py-5 text-blue-600 font-bold text-xs uppercase tracking-tighter">${v.Rotulo}</td>
                        <td class="px-4 py-5 font-bold text-slate-800">${cargo}</td>
                        <td class="px-4 py-5 text-slate-500">${setor}</td>
                        <td class="px-4 py-5 text-slate-500">${gestor}</td>
                        <td class="px-4 py-5">${contrato}</td>
                        <td class="px-4 py-5 font-semibold text-slate-700">${salario}</td>
                        <td class="px-4 py-5"><span class="badge-${status}">${status}</span></td>
                        <td class="px-8 py-5 text-right"><i class="fas fa-ellipsis-h text-slate-300 cursor-pointer hover:text-blue-500"></i></td>
                    </tr>
                `;
            }).join('');
        }

        // Inicia carregando a página de vagas para você ver o resultado
        trocarPagina('vagas');
        carregarDados();
    </script>
</body>
</html>
