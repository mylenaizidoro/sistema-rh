<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard RH - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        /* Estilo Clean Design */
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        
        .card { 
            background: #ffffff; 
            border-radius: 16px; 
            padding: 30px; 
            max-width: 950px; 
            margin: 25px auto; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .grid-info { display: grid; grid-template-columns: 1fr 280px; gap: 25px; align-items: center; }
        
        .info-box { 
            background: #f1f5f9; 
            padding: 20px; 
            border-radius: 12px; 
            border-left: 5px solid #0284c7; 
            font-size: 0.9rem; 
            line-height: 1.6;
            color: #475569;
        }
        .info-box b { color: #0284c7; display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 0.8rem; }

        h1 { color: #0f172a; font-weight: 700; text-align: center; }
        h2 { color: #0284c7; margin: 0; font-size: 1.4rem; text-transform: uppercase; }
        .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 25px; }
        
        .chart-container { position: relative; height: 350px; width: 100%; }
        .back-btn { color: #64748b; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 20px; }
        
        @media (max-width: 768px) { .grid-info { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div style="max-width: 950px; margin: auto;">
        <a href="index.html" class="back-btn">← Voltar para perfis</a>
        <h1>Gestão de Indicadores PA-03</h1>
    </div>

    <div id="container-graficos"></div>

<script>
    const planilhaDrive = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?output=csv";

    function limparNumero(v) {
        if (!v || v.toString().trim() === "") return 0;
        let n = v.toString().replace(/\s/g, '').replace(',', '.');
        return parseFloat(n) || 0;
    }

    function normalizar(txt) {
        return txt ? txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : "";
    }

    function criarGrafico(tituloExibicao, dadosFiltrados, infoAdicional = null, isStacked = false) {
        const container = document.getElementById('container-graficos');
        const idUnique = Math.random().toString(36).substr(2, 9);

        container.innerHTML += `
            <div class="card">
                <h2>${tituloExibicao}</h2>
                <p class="sub">Grupo Coplac | Performance</p>
                <div class="${infoAdicional ? 'grid-info' : ''}">
                    <div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div>
                    ${infoAdicional ? `<div class="info-box">${infoAdicional}</div>` : ''}
                </div>
            </div>`;

        setTimeout(() => {
            const ctx = document.getElementById(`chart-${idUnique}`);
            const labels = [...new Set(dadosFiltrados.map(ln => ln.mes))];
            let datasets = [];

            if (isStacked) {
                const tipos = [...new Set(dadosFiltrados.map(ln => ln.Indicador))];
                const cores = ['#0ea5e9', '#f59e0b', '#ef4444'];
                datasets = tipos.map((tipo, i) => ({
                    label: tipo,
                    data: labels.map(mes => {
                        const registro = dadosFiltrados.find(ln => ln.mes === mes && ln.Indicador === tipo);
                        return registro ? limparNumero(registro['Valor Real']) : 0;
                    }),
                    backgroundColor: cores[i % cores.length],
                    borderRadius: 6
                }));
            } else {
                const valoresReais = dadosFiltrados.map(ln => limparNumero(ln['Valor Real']));
                const metas = dadosFiltrados.map(ln => limparNumero(ln.Objetivo));
                const coresBarras = valoresReais.map((valor, index) => {
                    const meta = metas[index];
                    const t = normalizar(tituloExibicao);
                    if (t.includes("ABSENTEISMO") || t.includes("TURNOVER") || t.includes("DESLIGAMENTO")) {
                        return (valor <= meta || meta === 0) ? '#22c55e' : '#ef4444';
                    }
                    return valor >= meta ? '#22c55e' : '#ef4444';
                });

                datasets = [
                    { label: 'Realizado', data: valoresReais, backgroundColor: coresBarras, borderRadius: 6 },
                    { label: 'Meta', data: metas, type: 'line', borderColor: '#475569', borderWidth: 3, fill: false }
                ];
            }

            new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { stacked: isStacked, grid: { display: false }, ticks: { color: '#64748b' } },
                        y: { stacked: isStacked, beginAtZero: true, grid: { color: '#e2e8f0' }, ticks: { color: '#64748b' } }
                    },
                    plugins: { legend: { position: 'top', labels: { color: '#1e293b' } } }
                }
            });
        }, 150);
    }

    Papa.parse(planilhaDrive + "&t=" + new Date().getTime(), {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            document.getElementById('container-graficos').innerHTML = "";
            
            const config = [
                { 
                    chave: "HORAS DE TREINAMENTO", 
                    titulo: "HORAS DE TREINAMENTO",
                    info: "<b>Nota Técnica</b> Horas de treinamentos programados e realizados ao mes" 
                },
                { 
                    chave: "APROVADOS EM TREINAMENTO", 
                    titulo: "APROVADOS EM TREINAMENTO",
                    info: "<b>Cálculo</b> %Aprovados em Treinamento = (Qtde Colaboradores Aprovados / Qtde Colaboradores Avaliados) * 100"
                },
                { chave: "TURNOVER PA", titulo: "TURNOVER PA - 03" },
                { chave: "UNIVERSAL", titulo: "TURNOVER - CÁLCULO UNIVERSAL" },
                { chave: "SOLICITACAO", titulo: "TURNOVER - SOLICITAÇÃO DE DESLIGAMENTOS" },
                { 
                    chave: "DESLIGAMENTO", 
                    titulo: "DESLIGAMENTOS (COMPOSIÇÃO TOTAL)", 
                    stacked: true,
                    info: "<b>Detalhamento</b> Visão consolidada de Pedidos + Mandados" 
                },
                { chave: "DESLIGAMENTO", titulo: "DESLIGAMENTOS - PEDIDOS", filtroExtra: "PEDIDOS" },
                { chave: "DESLIGAMENTO", titulo: "DESLIGAMENTOS - MANDADO", filtroExtra: "MANDADO" },
                { chave: "ABSENTEISMO", titulo: "ABSENTEÍSMO PA - 03" },
                { chave: "RETENCAO", titulo: "RETENÇÃO", filtroExtra: "Meritocracia" },
                { 
                    chave: "VALORIZACAO INTERNA", titulo: "RETENÇÃO PLANO DE VALORIZAÇÃO INTERNA (MOV.)",
                    filtroExtra: "MOVIMENTACOES", info: "<b>Métrica</b> Recrutamento Interno + Direcionado"
                },
                { 
                    chave: "VALORIZACAO INTERNA", titulo: "RETENÇÃO PLANO DE VALORIZAÇÃO INTERNA (TAXA)",
                    filtroExtra: "TAXA DE PROMOÇÃO", info: "<b>Métrica</b> N° Total da taxa de promoção Interna"
                }
            ];

            config.forEach(item => {
                let filtrados = dados.filter(ln => normalizar(ln.Processo).includes(normalizar(item.chave)));
                if (item.filtroExtra) {
                    filtrados = filtrados.filter(ln => normalizar(ln.Indicador).includes(normalizar(item.filtroExtra)));
                }
                if (filtrados.length > 0) {
                    criarGrafico(item.titulo, filtrados, item.info || null, item.stacked || false);
                }
            });
        }
    });
</script>
</body>
</html>
