<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard RH - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; }
        
        .header-container { max-width: 1200px; margin: auto; }
        h1 { color: #0f172a; font-weight: 800; text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: -0.5px; }
        
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .kpi-card { background: white; padding: 20px; border-radius: 12px; border: none; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: 0.3s; }
        .kpi-card:hover { transform: translateY(-5px); }
        .kpi-card small { color: #64748b; font-size: 0.75rem; text-transform: uppercase; font-weight: 600; }
        .kpi-card div { font-size: 1.8rem; font-weight: 700; color: #0284c7; margin-top: 5px; }

        .card { background: #ffffff; border-radius: 16px; padding: 25px; max-width: 1100px; margin: 25px auto; border: none; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04); page-break-inside: avoid; }
        .grid-info { display: grid; grid-template-columns: 1fr 280px; gap: 25px; align-items: center; }
        
        @media (max-width: 900px) { .grid-info { grid-template-columns: 1fr; } }

        .info-box { background: #f1f5f9; padding: 20px; border-radius: 12px; border-left: 5px solid #0284c7; font-size: 0.9rem; line-height: 1.6; color: #475569; }
        .info-box.alert { border-left-color: #f43f5e; background: #fff1f2; }
        .info-box b { color: #0284c7; display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 0.8rem; }
        .info-box.alert b { color: #f43f5e; }
        
        h2 { color: #0f172a; margin: 0; font-size: 1.1rem; text-transform: uppercase; font-weight: 700; }
        .sub { color: #94a3b8; font-size: 0.8rem; margin-bottom: 20px; }
        .chart-container { position: relative; height: 350px; width: 100%; }

        .controls { text-align: center; margin-bottom: 30px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; align-items: center; }
        .btn { padding: 10px 20px; border: 1px solid #e2e8f0; background: white; color: #475569; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn.active { background: #0284c7; color: white; border-color: #0284c7; }
        .select-turno { padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-weight: 600; color: #475569; cursor: pointer; }
        .btn-pdf { background: #0f172a; color: white; border-color: #0f172a; }

        @media print { .controls, .back-btn { display: none !important; } body { background: white; } .card { box-shadow: none; border: 1px solid #eee; } }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 id="main-title">GESTÃO DE INDICADORES - DHO CURITIBA</h1>
        
        <div class="controls">
            <button class="btn active" onclick="filtrarAno('TODOS', this)">Ver Todos</button>
            <button class="btn" onclick="filtrarAno('2025', this)">2025</button>
            <button class="btn" onclick="filtrarAno('2026', this)">2026</button>

            <select id="selectTurno" class="select-turno" onchange="filtrarTurno()">
                <option value="TODOS">Todos os Turnos</option>
                <option value="1º TURNO">1º Turno</option>
                <option value="2º TURNO">2º Turno</option>
                <option value="3º TURNO">3º Turno</option>
            </select>

            <button class="btn btn-pdf" onclick="window.print()">Exportar PDF</button>
        </div>

        <div id="kpi-summary" class="kpi-row"></div>
    </div>

    <div id="container-graficos"></div>

<script>
    Chart.register(ChartDataLabels);

    const planilhaDrive = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?output=csv";

    let dadosGlobais = [];
    let anoSelecionado = 'TODOS';
    let turnoSelecionado = 'TODOS';

    // Cores específicas solicitadas por você
    const coresTurnos = {
        "1º TURNO": "#0284c7", // Azul
        "2º TURNO": "#f97316", // Laranja
        "3º TURNO": "#7c3aed"  // Roxo
    };

    const labelsTodos = [];
    for(let m=1; m<=12; m++) labelsTodos.push(`${m.toString().padStart(2,'0')}/2025`);
    for(let m=1; m<=12; m++) labelsTodos.push(`${m.toString().padStart(2,'0')}/2026`);

    function limparNumero(v) {
        if (!v || v.toString().trim() === "") return 0;
        let n = v.toString().replace(/\s/g, '').replace(',', '.').replace('%', '');
        return parseFloat(n) || 0;
    }

    function normalizar(txt) {
        return txt ? txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : "";
    }

    function filtrarAno(ano, btn) {
        anoSelecionado = ano;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        renderizarDashboard();
    }

    function filtrarTurno() {
        turnoSelecionado = document.getElementById('selectTurno').value;
        renderizarDashboard();
    }

    function obterDadosFiltrados(chaveProcesso) {
        return dadosGlobais.filter(ln => {
            const matchProcesso = normalizar(ln.Processo).includes(normalizar(chaveProcesso));
            const matchAno = anoSelecionado === 'TODOS' || ln.mes.includes(anoSelecionado);
            let matchTurno = true;
            if (turnoSelecionado !== 'TODOS') {
                matchTurno = normalizar(ln.Indicador).includes(normalizar(turnoSelecionado)) || normalizar(ln.Processo).includes(normalizar(turnoSelecionado));
            }
            return matchProcesso && matchAno && matchTurno;
        });
    }

    function calcularResumo() {
        const kpiDiv = document.getElementById('kpi-summary');
        const getMedia = (chave) => {
            const filtrados = obterDadosFiltrados(chave).filter(d => limparNumero(d['Valor Real'] || d.Qtd) > 0);
            if (!filtrados.length) return "0";
            const soma = filtrados.reduce((acc, curr) => acc + limparNumero(curr['Valor Real'] || curr.Qtd), 0);
            return (soma / filtrados.length).toFixed(1);
        };

        kpiDiv.innerHTML = `
            <div class="kpi-card"><small>Média Absenteísmo</small><div>${getMedia("ABSENTEISMO")}%</div></div>
            <div class="kpi-card"><small>Turnover Universal</small><div>${getMedia("UNIVERSAL")}%</div></div>
            <div class="kpi-card"><small>Horas Treinamento</small><div>${getMedia("HORAS DE TREINAMENTO")}h</div></div>
            <div class="kpi-card"><small>Aprovação Média</small><div>${getMedia("APROVADOS EM TREINAMENTO")}%</div></div>
        `;
    }

    // Modelo de gráfico comparativo por Turno (Azul, Laranja, Roxo)
    function criarGraficoPorTurno(titulo, termoProcesso, nota) {
        const idUnique = Math.random().toString(36).substr(2, 9);
        const labelsExibicao = anoSelecionado === 'TODOS' ? labelsTodos : labelsTodos.filter(l => l.includes(anoSelecionado));

        document.getElementById('container-graficos').innerHTML += `
            <div class="card">
                <h2>${titulo}</h2>
                <p class="sub">Grupo Coplac | Visão por Turno</p>
                <div class="grid-info">
                    <div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div>
                    <div class="info-box"><b>DETALHAMENTO</b> ${nota}</div>
                </div>
            </div>`;

        setTimeout(() => {
            const turnos = ["1º TURNO", "2º TURNO", "3º TURNO"];
            const datasets = turnos.map(turno => ({
                label: turno,
                backgroundColor: coresTurnos[turno],
                data: labelsExibicao.map(mes => {
                    const r = dadosGlobais.find(ln => 
                        normalizar(ln.Processo).includes(normalizar(termoProcesso)) && 
                        normalizar(ln.Indicador).includes(normalizar(turno)) && 
                        ln.mes === mes
                    );
                    return r ? limparNumero(r['Valor Real'] || r.Qtd) : 0;
                }),
                borderRadius: 4
            }));

            new Chart(document.getElementById(`chart-${idUnique}`), {
                type: 'bar',
                data: { labels: labelsExibicao, datasets: datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { datalabels: { anchor: 'end', align: 'top', formatter: v => v > 0 ? v : '', font: { weight: 'bold', size: 10 } } },
                    scales: { x: { grid: { display: false } }, y: { beginAtZero: true } }
                }
            });
        }, 150);
    }

    function criarGraficoPerformance(itemConfig) {
        const dados = obterDadosFiltrados(itemConfig.chave);
        if (dados.length === 0) return;
        const idUnique = Math.random().toString(36).substr(2, 9);
        const labelsExibicao = anoSelecionado === 'TODOS' ? labelsTodos : labelsTodos.filter(l => l.includes(anoSelecionado));
        
        document.getElementById('container-graficos').innerHTML += `
            <div class="card">
                <h2>${itemConfig.titulo}</h2>
                <p class="sub">Grupo Coplac | Performance</p>
                <div class="grid-info">
                    <div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div>
                    <div class="info-box"><b>INDICADOR</b> ${itemConfig.nota}</div>
                </div>
            </div>`;

        setTimeout(() => {
            const valores = labelsExibicao.map(m => {
                const r = dados.find(ln => ln.mes === m);
                return r ? limparNumero(r['Valor Real'] || r.Qtd) : null;
            });
            const metas = labelsExibicao.map(m => {
                const r = dados.find(ln => ln.mes === m);
                return r ? limparNumero(r.Objetivo) : null;
            });

            new Chart(document.getElementById(`chart-${idUnique}`), {
                type: 'bar',
                data: {
                    labels: labelsExibicao,
                    datasets: [
                        { label: 'Realizado', data: valores, backgroundColor: '#0284c7', borderRadius: 6 },
                        { label: 'Meta', data: metas, type: 'line', borderColor: '#f59e0b', borderWidth: 2, fill: false, pointRadius: 0 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { datalabels: { anchor: 'end', align: 'top', formatter: v => v ? v + (itemConfig.chave.includes("TREINAMENTO") ? "" : "%") : "" } }
                }
            });
        }, 150);
    }

    function renderizarDashboard() {
        document.getElementById('container-graficos').innerHTML = "";
        calcularResumo();

        // 1. Indicadores Gerais
        criarGraficoPerformance({ chave: "ABSENTEISMO", titulo: "Absenteísmo PA-03", nota: "Horas ausentes sobre horas programadas." });
        criarGraficoPerformance({ chave: "UNIVERSAL", titulo: "Turnover Universal", nota: "Média de admissões e desligamentos sobre ativos." });

        // 2. Turnover por Turno (Conforme solicitado)
        criarGraficoPorTurno("Solicitação de Desligamento (Até 15 dias)", "SOLICITACAO DE DESLIGAMENTO ATE 15", "Pedidos feitos pelo colaborador no período de experiência inicial.");
        criarGraficoPorTurno("Solicitação de Desligamento (16 a 30 dias)", "SOLICITACAO DE DESLIGAMENTO 16 A 30", "Pedidos de saída entre o 16º e 30º dia.");
        criarGraficoPorTurno("Iniciativa Empresa (Até 15 dias)", "INICIATIVA DE DESLIGAMENTO DA EMPRESA dentro de 15 dias", "Desligamentos realizados pela gestão nos primeiros 15 dias.");

        // 3. Treinamentos
        criarGraficoPerformance({ chave: "HORAS DE TREINAMENTO", titulo: "Horas de Treinamento", nota: "Volume total de capacitação." });
    }

    Papa.parse(planilhaDrive + "&t=" + new Date().getTime(), {
        download: true, header: true, skipEmptyLines: true,
        complete: function(r) { dadosGlobais = r.data; renderizarDashboard(); }
    });
</script>
</body>
</html>
