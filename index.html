<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard DHO - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; padding: 20px; }
        .card { background: #1e293b; border-radius: 15px; padding: 25px; max-width: 900px; margin: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        h2 { color: #38bdf8; margin-bottom: 5px; }
        p.sub { color: #94a3b8; margin-bottom: 25px; }
        .chart-container { position: relative; height: 400px; }
        .back-btn { color: #94a3b8; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card">
    <a href="index.html" class="back-btn">← Voltar para perfis</a>
    <h2>Indicadores de DHO</h2>
    <p class="sub">Gestão de Treinamento e Desenvolvimento - Grupo Coplac</p>
    
    <div class="chart-container">
        <canvas id="graficoTreinamento"></canvas>
    </div>
</div>

<script>
    const csvUrl = 'dados.csv';

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            
            // FILTRO: Pega apenas as linhas de HORAS DE TREINAMENTO
            const treinoData = dados.filter(item => 
                item.Processo && item.Processo.includes("HORAS DE TREINAMENTO")
            );

            const meses = treinoData.map(item => item.Mês);
            const reais = treinoData.map(item => parseFloat(item['Valor Real'].replace(',', '.')));
            const metas = treinoData.map(item => parseFloat(item.Objetivo.replace(',', '.')));

            new Chart(document.getElementById('graficoTreinamento'), {
                type: 'bar',
                data: {
                    labels: meses,
                    datasets: [
                        {
                            label: 'Horas Realizadas',
                            data: reais,
                            backgroundColor: '#38bdf8', // Azul Coplac
                            borderRadius: 5
                        },
                        {
                            label: 'Meta de Horas',
                            data: metas,
                            backgroundColor: 'rgba(255, 255, 255, 0.1)',
                            borderColor: '#94a3b8',
                            borderWidth: 1,
                            type: 'line' // Mostra a meta como uma linha para facilitar a leitura
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    },
                    plugins: {
                        legend: { labels: { color: '#f1f5f9' } }
                    }
                }
            });
        }
    });
</script>
</body>
</html>
