<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard DHO - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; margin: 0; }
        .card { background: #1e293b; border-radius: 15px; padding: 25px; max-width: 900px; margin: 40px auto; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        h2 { color: #38bdf8; margin: 0; }
        .sub { color: #94a3b8; margin-bottom: 30px; }
        .chart-container { position: relative; height: 450px; width: 100%; }
        .back-btn { color: #94a3b8; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 20px; }
        #status-msg { color: #ef4444; font-weight: bold; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <a href="index.html" class="back-btn">← Voltar para perfis</a>
    <h2>Indicadores de DHO</h2>
    <p class="sub">Ada — Treinamento e Desenvolvimento | Grupo Coplac</p>
    
    <div id="status-msg"></div> <div class="chart-container">
        <canvas id="graficoDHO"></canvas>
    </div>
</div>

<script>
    const csvUrl = 'dados.csv';
    const statusDiv = document.getElementById('status-msg');

    function formatarParaNumero(valor) {
        if (!valor) return 0;
        let limpo = valor.toString().replace(/[^\d,.-]/g, '').replace(',', '.');
        return parseFloat(limpo) || 0;
    }

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            console.log("Dados brutos:", dados);

            // Filtro ignorando espaços e maiúsculas
            const treinoData = dados.filter(item => {
                const p = (item.Processo || "").trim().toUpperCase();
                return p.includes("TREINAMENTO");
            });

            if (treinoData.length === 0) {
                statusDiv.innerText = "Erro: Não encontrei a palavra 'TREINAMENTO' na coluna 'Processo' do seu CSV.";
                return;
            }

            const meses = treinoData.map(item => item.Mês || "Sem data");
            const reais = treinoData.map(item => formatarParaNumero(item['Valor Real']));
            const metas = treinoData.map(item => formatarParaNumero(item.Objetivo));

            const ctx = document.getElementById('graficoDHO').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: meses,
                    datasets: [
                        {
                            label: 'Horas Realizadas',
                            data: reais,
                            backgroundColor: '#38bdf8',
                            borderRadius: 6
                        },
                        {
                            label: 'Meta (Objetivo)',
                            data: metas,
                            type: 'line',
                            borderColor: '#ef4444',
                            borderWidth: 3,
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        x: { ticks: { color: '#94a3b8' } }
                    },
                    plugins: { legend: { labels: { color: '#f1f5f9' } } }
                }
            });
        },
        error: function(err) {
            statusDiv.innerText = "Erro: O arquivo 'dados.csv' não foi encontrado no GitHub.";
            console.error(err);
        }
    });
</script>

</body>
</html>
