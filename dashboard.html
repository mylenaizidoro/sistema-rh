<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard RH - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        /* MANTIDO SEU ESTILO ORIGINAL */
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container-master { max-width: 1000px; margin: auto; }
        .card { background: #ffffff; border-radius: 16px; padding: 30px; margin-bottom: 25px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .grid-info { display: grid; grid-template-columns: 1fr 280px; gap: 25px; align-items: center; }
        .info-box { background: #f1f5f9; padding: 20px; border-radius: 12px; border-left: 5px solid #0284c7; font-size: 0.9rem; color: #475569; }
        h1 { color: #0f172a; text-align: center; margin-bottom: 30px; text-transform: uppercase; }
        h2 { color: #0284c7; margin: 0; font-size: 1.1rem; text-transform: uppercase; }
        .sub { color: #64748b; font-size: 0.8rem; margin-bottom: 20px; }
        .chart-container { position: relative; height: 350px; width: 100%; }

        /* ADIÇÃO: ESTILO DOS CARDS DE INDICADORES (ESTILO POSIGRAF) */
        .summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .summary-card { background: #111827; color: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .summary-card h3 { margin: 0; font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.5px; }
        .summary-card .value { font-size: 2rem; font-weight: bold; margin: 10px 0; color: #ffffff; }
        
        @media (max-width: 768px) { .grid-info { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container-master">
    <h1>GESTÃO DE INDICADORES - DHO CURITIBA</h1>

    <div class="summary-row" id="summary-cards">
        <div class="summary-card">
            <h3>Hora-Homem de Treinamento (Mês)</h3>
            <div class="value" id="card-hh">...</div>
        </div>
        <div class="summary-card">
            <h3>Participantes (Mês)</h3>
            <div class="value" id="card-part">...</div>
        </div>
        <div class="summary-card">
            <h3>Treinamentos Realizados</h3>
            <div class="value" id="card-trein">...</div>
        </div>
    </div>

    <div id="container-graficos"></div>
</div>

<script>
    Chart.register(ChartDataLabels);

    const planilhaDrive = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?output=csv";

    // MANTIDO: SUAS FUNÇÕES ORIGINAIS DE TRATAMENTO
    function limparNumero(v) {
        if (!v || v.toString().trim() === "") return 0;
        return parseFloat(v.toString().replace(/\s/g, '').replace(',', '.')) || 0;
    }

    function normalizar(txt) {
        return txt ? txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : "";
    }

    // ADIÇÃO: FUNÇÃO PARA PREENCHER OS CARDS AUTOMATICAMENTE
    function atualizarCardsTopo(dados) {
        // Pega o último mês da planilha para garantir o dado mais atual
        const meses = [...new Set(dados.map(ln => ln.mes))];
        const ultimoMes = meses[meses.length - 1];

        // Filtra os valores buscando pelos nomes que estão no seu Excel
        const hh = dados.find(ln => normalizar(ln.Processo).includes("HORA-HOMEM") && ln.mes === ultimoMes);
        const part = dados.find(ln => normalizar(ln.Processo).includes("PARTICIPANTES") && ln.mes === ultimoMes);
        const trein = dados.find(ln => normalizar(ln.Processo).includes("TREINAMENTOS REALIZADOS") && ln.mes === ultimoMes);

        if(hh) document.getElementById('card-hh').innerText = limparNumero(hh['Valor Real']).toLocaleString('pt-BR') + ' h';
        if(part) document.getElementById('card-part').innerText = limparNumero(part['Valor Real']);
        if(trein) document.getElementById('card-trein').innerText = limparNumero(trein['Valor Real']);
    }

    // MANTIDO: FUNÇÃO ORIGINAL DE GRÁFICOS
    function criarGrafico(tituloExibicao, dadosFiltrados, notaTecnica = "") {
        const container = document.getElementById('container-graficos');
        const idUnique = Math.random().toString(36).substr(2, 9);
        
        container.innerHTML += `
            <div class="card">
                <h2>${tituloExibicao}</h2>
                <p class="sub">Grupo Coplac | Performance</p>
                <div class="${notaTecnica ? 'grid-info' : ''}">
                    <div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div>
                    ${notaTecnica ? `<div class="info-box"><b>DETALHAMENTO</b><br>${notaTecnica}</div>` : ''}
                </div>
            </div>`;
        
        setTimeout(() => {
            const ctx = document.getElementById(`chart-${idUnique}`);
            const labels = [...new Set(dadosFiltrados.map(ln => ln.mes))];
            const metas = labels.map(mes => {
                const r = dadosFiltrados.find(ln => ln.mes === mes);
                return r ? limparNumero(r.Objetivo) : 0;
            });

            const dadosDentroMeta = [];
            const dadosForaMeta = [];

            labels.forEach((mes, index) => {
                const r = dadosFiltrados.find(ln => ln.mes === mes);
                const valor = r ? limparNumero(r['Valor Real']) : 0;
                const meta = metas[index];
                const t = normalizar(tituloExibicao);
                
                let atingiuMeta = (t.includes("ABSENTEISMO") || t.includes("TURNOVER")) 
                    ? (valor <= meta || meta === 0) 
                    : (valor >= meta);

                if (atingiuMeta) {
                    dadosDentroMeta.push(valor);
                    dadosForaMeta.push(null);
                } else {
                    dadosDentroMeta.push(null);
                    dadosForaMeta.push(valor);
                }
            });

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Realizado dentro da meta', data: dadosDentroMeta, backgroundColor: '#22c55e', borderRadius: 6, stack: 's' },
                        { label: 'Realizado fora da meta', data: dadosForaMeta, backgroundColor: '#ef4444', borderRadius: 6, stack: 's' },
                        { label: 'Meta', data: metas, type: 'line', borderColor: '#475569', borderWidth: 3, fill: false, pointRadius: 4, datalabels: { display: false } }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' },
                        datalabels: {
                            color: '#475569', font: { weight: 'bold' },
                            anchor: 'end', align: 'top',
                            formatter: (val) => (val !== null && val !== 0) ? val.toLocaleString('pt-BR') : ''
                        }
                    },
                    scales: { y: { beginAtZero: true, grace: '15%' } }
                }
            });
        }, 150);
    }

    // MANTIDO: FUNÇÃO ORIGINAL DE CONSOLIDADO MOD/MOI
    function criarGraficoConsolidado(titulo, dadosMOD, dadosMOI) {
        const container = document.getElementById('container-graficos');
        const idUnique = Math.random().toString(36).substr(2, 9);
        container.innerHTML += `<div class="card"><h2>${titulo}</h2><p class="sub">Grupo Coplac | Unificado</p><div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div></div>`;
        
        setTimeout(() => {
            const ctx = document.getElementById(`chart-${idUnique}`);
            const labels = [...new Set([...dadosMOD.map(d => d.mes), ...dadosMOI.map(d => d.mes)])].sort();
            const vMOD = labels.map(m => limparNumero(dadosMOD.find(ln => ln.mes === m)?.['Valor Real']));
            const vMOI = labels.map(m => limparNumero(dadosMOI.find(ln => ln.mes === m)?.['Valor Real']));
            const meta = labels.map(m => {
                const linha = dadosMOD.find(ln => ln.mes === m) || dadosMOI.find(ln => ln.mes === m);
                return limparNumero(linha?.Objetivo);
            });

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'MOI', data: vMOI, backgroundColor: '#cbd5e1', stack: 's1' },
                        { label: 'MOD', data: vMOD, backgroundColor: '#475569', stack: 's1' },
                        { label: 'Meta', data: meta, type: 'line', borderColor: '#000', borderWidth: 2, pointRadius: 5, datalabels: { display: false } }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { datalabels: { color: '#fff', font: { weight: 'bold' }, anchor: 'center', align: 'center' } },
                    scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } }
                }
            });
        }, 150);
    }

    // MANTIDO: LOGÍCA DE CARREGAMENTO PAPA PARSE
    Papa.parse(planilhaDrive + "&t=" + new Date().getTime(), {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            document.getElementById('container-graficos').innerHTML = "";

            // ADIÇÃO: CHAMA OS CARDS AUTOMÁTICOS
            atualizarCardsTopo(dados);

            // MANTIDO: SEUS GRÁFICOS ORIGINAIS
            const config = [
                { chave: "HORAS DE TREINAMENTO", titulo: "HORAS DE TREINAMENTO", nota: "Horas de treinamentos programados e realizados no mês" },
                { chave: "APROVADOS EM TREINAMENTO", titulo: "APROVADOS EM TREINAMENTO", nota: "%Aprovados em Treinamento" },
                { chave: "TURNOVER PA", titulo: "TURNOVER PA - 03", nota: "%TurnOver" },
                { chave: "ABSENTEISMO", titulo: "ABSENTEÍSMO PA - 03", nota: "% Absenteísmo" }
            ];

            config.forEach(item => {
                let filtrados = dados.filter(ln => normalizar(ln.Processo).includes(normalizar(item.chave)));
                if (filtrados.length > 0) criarGrafico(item.titulo, filtrados, item.nota);
            });

            const dMOD = dados.filter(ln => normalizar(ln.Processo).includes("INICIATIVA DE DESLIGAMENTO DA EMPRESA GERAL MES") && normalizar(ln.Indicador) === "MOD");
            const dMOI = dados.filter(ln => normalizar(ln.Processo).includes("INICIATIVA DE DESLIGAMENTO DA EMPRESA GERAL MES") && normalizar(ln.Indicador) === "MOI");
            if (dMOD.length || dMOI.length) criarGraficoConsolidado("TURNOVER - INICIATIVA EMPRESA GERAL (CONSOLIDADO)", dMOD, dMOI);
        }
    });
</script>
</body>
</html>
