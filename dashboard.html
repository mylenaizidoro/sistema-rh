<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard RH - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: #ffffff; border-radius: 16px; padding: 30px; max-width: 950px; margin: 25px auto; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .grid-info { display: grid; grid-template-columns: 1fr 280px; gap: 25px; align-items: center; }
        .info-box { background: #f1f5f9; padding: 20px; border-radius: 12px; border-left: 5px solid #0284c7; font-size: 0.9rem; line-height: 1.6; color: #475569; }
        .info-box b { color: #0284c7; display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 0.8rem; }
        h1 { color: #0f172a; font-weight: 700; text-align: center; margin-bottom: 30px; text-transform: uppercase; }
        h2 { color: #0284c7; margin: 0; font-size: 1.2rem; text-transform: uppercase; }
        .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 25px; }
        .chart-container { position: relative; height: 380px; width: 100%; }
        .back-btn { color: #64748b; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 20px; }
        
        /* CARDS DO TOPO */
        .summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; max-width: 950px; margin: 0 auto 30px auto; }
        .summary-card { background: #111827; color: white; padding: 20px; border-radius: 16px; text-align: center; }
        .summary-card h3 { margin: 0; font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }
        .summary-card .value { font-size: 1.8rem; font-weight: bold; margin-top: 8px; }

        @media (max-width: 768px) { .grid-info { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div style="max-width: 950px; margin: auto;">
        <a href="index.html" class="back-btn">← Voltar para perfis</a>
        <h1>GESTÃO DE INDICADORES - DHO CURITIBA</h1>
        
        <div class="summary-row">
            <div class="summary-card"><h3>Hora-Homem Treinamento</h3><div class="value" id="card-hh">0</div></div>
            <div class="summary-card"><h3>Participantes</h3><div class="value" id="card-part">0</div></div>
            <div class="summary-card"><h3>Treinamentos Realizados</h3><div class="value" id="card-trein">0</div></div>
        </div>
    </div>

    <div id="container-graficos"></div>

<script>
    Chart.register(ChartDataLabels);

    const planilhaDrive = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?output=csv";

    function limparNumero(v) {
        if (!v || v.toString().trim() === "") return 0;
        let n = v.toString().replace(/\s/g, '').replace(',', '.');
        return parseFloat(n) || 0;
    }

    function normalizar(txt) {
        return txt ? txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : "";
    }

    // FUNÇÃO GRÁFICO ORIGINAL (Individual)
    function criarGrafico(tituloExibicao, dadosFiltrados, notaTecnica = "") {
        const container = document.getElementById('container-graficos');
        const idUnique = Math.random().toString(36).substr(2, 9);
        let layoutHtml = notaTecnica 
            ? `<div class="grid-info"><div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div><div class="info-box"><b>DETALHAMENTO</b> ${notaTecnica}</div></div>`
            : `<div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div>`;

        container.innerHTML += `<div class="card"><h2>${tituloExibicao}</h2><p class="sub">Grupo Coplac | Performance</p>${layoutHtml}</div>`;
        
        setTimeout(() => {
            const ctx = document.getElementById(`chart-${idUnique}`);
            const labels = [...new Set(dadosFiltrados.map(ln => ln.mes))];
            const metas = labels.map(mes => {
                const r = dadosFiltrados.find(ln => ln.mes === mes);
                return r ? limparNumero(r.Objetivo) : 0;
            });

            const dadosDentroMeta = [];
            const dadosForaMeta = [];

            labels.forEach((mes, index) => {
                const r = dadosFiltrados.find(ln => ln.mes === mes);
                const valor = r ? limparNumero(r['Valor Real']) : 0;
                const meta = metas[index];
                const t = normalizar(tituloExibicao);
                
                let atingiuMeta = (t.includes("ABSENTEISMO") || t.includes("TURNOVER")) 
                    ? (valor <= meta || meta === 0) 
                    : (valor >= meta);

                if (atingiuMeta) {
                    dadosDentroMeta.push(valor); dadosForaMeta.push(null);
                } else {
                    dadosDentroMeta.push(null); dadosForaMeta.push(valor);
                }
            });

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Dentro da meta', data: dadosDentroMeta, backgroundColor: '#22c55e', borderRadius: 6, stack: 's' },
                        { label: 'Fora da meta', data: dadosForaMeta, backgroundColor: '#ef4444', borderRadius: 6, stack: 's' },
                        { label: 'Meta', data: metas, type: 'line', borderColor: '#475569', borderWidth: 3, fill: false, pointRadius: 4, datalabels: { display: false } }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { color: '#475569', font: { weight: 'bold' }, anchor: 'end', align: 'top', formatter: (v) => v ? v.toLocaleString('pt-BR') : '' } }, scales: { y: { beginAtZero: true, grace: '15%' } } }
            });
        }, 150);
    }

    // FUNÇÃO GRÁFICO CONSOLIDADO (MOD/MOI)
    function criarGraficoConsolidado(titulo, dadosMOD, dadosMOI) {
        const container = document.getElementById('container-graficos');
        const idUnique = Math.random().toString(36).substr(2, 9);
        container.innerHTML += `<div class="card"><h2>${titulo}</h2><p class="sub">Grupo Coplac | Unificado</p><div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div></div>`;
        
        setTimeout(() => {
            const ctx = document.getElementById(`chart-${idUnique}`);
            const labels = [...new Set([...dadosMOD.map(d => d.mes), ...dadosMOI.map(d => d.mes)])].sort();
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'MOI', data: labels.map(m => limparNumero(dadosMOI.find(ln => ln.mes === m)?.['Valor Real'])), backgroundColor: '#cbd5e1', stack: 's1' },
                        { label: 'MOD', data: labels.map(m => limparNumero(dadosMOD.find(ln => ln.mes === m)?.['Valor Real'])), backgroundColor: '#475569', stack: 's1' },
                        { label: 'Meta', data: labels.map(m => limparNumero((dadosMOD.find(ln => ln.mes === m) || dadosMOI.find(ln => ln.mes === m))?.Objetivo)), type: 'line', borderColor: '#000', borderWidth: 2, datalabels: { display: false } }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { color: '#fff', font: { weight: 'bold' }, formatter: (v) => v > 0 ? v : '' } }, scales: { x: { stacked: true }, y: { stacked: true } } }
            });
        }, 150);
    }

    Papa.parse(planilhaDrive + "&t=" + new Date().getTime(), {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            document.getElementById('container-graficos').innerHTML = "";

            // ATUALIZAÇÃO CARDS
            const ultimoMes = dados[dados.length - 1]?.mes;
            const hh = dados.find(ln => normalizar(ln.Processo).includes("HORA-HOMEM") && ln.mes === ultimoMes);
            const part = dados.find(ln => normalizar(ln.Processo).includes("PARTICIPANTES") && ln.mes === ultimoMes);
            const trein = dados.find(ln => normalizar(ln.Processo).includes("TREINAMENTOS REALIZADOS") && ln.mes === ultimoMes);

            if(hh) document.getElementById('card-hh').innerText = limparNumero(hh['Valor Real']).toLocaleString('pt-BR');
            if(part) document.getElementById('card-part').innerText = limparNumero(part['Valor Real']);
            if(trein) document.getElementById('card-trein').innerText = limparNumero(trein['Valor Real']);

            // 1. GRÁFICOS ORIGINAIS (RESTORE)
            const config = [
                { chave: "HORAS DE TREINAMENTO", titulo: "HORAS DE TREINAMENTO", nota: "Horas de treinamentos programados e realizados no mês" },
                { chave: "APROVADOS EM TREINAMENTO", titulo: "APROVADOS EM TREINAMENTO", nota: "%Aprovados em Treinamento" },
                { chave: "TURNOVER PA", titulo: "TURNOVER PA - 03", nota: "%TurnOver" },
                { chave: "UNIVERSAL", titulo: "TURNOVER - CÁLCULO UNIVERSAL", nota: "Cálculo Geral" },
                { chave: "ABSENTEISMO", titulo: "ABSENTEÍSMO PA - 03", nota: "% Absenteísmo" }
            ];

            config.forEach(item => {
                let filtrados = dados.filter(ln => normalizar(ln.Processo).includes(normalizar(item.chave)));
                if (filtrados.length > 0) criarGrafico(item.titulo, filtrados, item.nota);
            });

            // 2. CONSOLIDADO DE 15 DIAS (NOVO)
            const dMOD = dados.filter(ln => normalizar(ln.Processo).includes("PEDIDO DE DESLIGAMENTO EM 15 DIAS") && normalizar(ln.Indicador) === "MOD");
            const dMOI = dados.filter(ln => normalizar(ln.Processo).includes("PEDIDO DE DESLIGAMENTO EM 15 DIAS") && normalizar(ln.Indicador) === "MOI");
            
            if (dMOD.length || dMOI.length) {
                criarGraficoConsolidado("PEDIDO DE DESLIGAMENTO EM 15 DIAS (CONSOLIDADO)", dMOD, dMOI);
            }
        }
    });
</script>
</body>
</html>
