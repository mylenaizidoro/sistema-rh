<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-800">

    <aside class="w-64 bg-[#0a1629] text-white flex flex-col p-6 shadow-xl">
        <div class="text-2xl font-bold mb-10 flex items-center gap-2">
            <span class="bg-blue-600 p-1 rounded text-sm text-white">R</span> HR Core
        </div>
        <nav class="space-y-4 flex-1">
            <a href="#" class="block bg-blue-600/20 text-blue-400 p-2 rounded-md font-semibold border-l-4 border-blue-600">Command Center</a>
            <a href="#" class="block text-slate-400 hover:text-white transition p-2">Analytics</a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-800">RH Command Center</h1>
            <p class="text-slate-500">Indicadores integrados via Excel</p>
        </header>

        <div id="container-cards" class="grid grid-cols-5 gap-4 mb-8"></div>

        <div class="grid grid-cols-2 gap-8 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-slate-700 mb-4">Vagas por Setor</h2>
                <div class="h-[250px]"><canvas id="chartSetor"></canvas></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-slate-700 mb-4">Evolução de Turnover</h2>
                <div class="h-[250px]"><canvas id="chartLinha"></canvas></div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-8">
            <div class="col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="font-bold mb-4 text-blue-600 italic">Funil de Recrutamento</h2>
                <div class="h-[300px]"><canvas id="chartFunil"></canvas></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold">Painel de Alertas</h2>
                    <span id="alerta-count" class="bg-blue-100 text-blue-600 text-xs px-2 py-1 rounded-full font-bold">0 Ativos</span>
                </div>
                <div id="lista-alertas" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <script>
        function carregarDados() {
            Papa.parse("dados.csv?v=" + new Date().getTime(), {
                download: true, 
                header: true, 
                skipEmptyLines: true,
                delimiter: ";", // ESTA LINHA CORRIGE O PROBLEMA DO SEU EXCEL
                complete: function(results) {
                    const dados = results.data;
                    
                    const cards = dados.filter(d => d.Tipo === "Card");
                    document.getElementById('container-cards').innerHTML = cards.map(c => `
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                            <p class="text-slate-500 text-sm">${c.Rotulo}</p>
                            <h3 class="text-2xl font-bold">${c.Valor}</h3>
                        </div>
                    `).join('');

                    const setores = dados.filter(d => d.Tipo === "Setor");
                    gerarGrafico('chartSetor', 'bar', setores.map(s => s.Rotulo), setores.map(s => s.Valor), '#8b5cf6', true);

                    const linha = dados.filter(d => d.Tipo === "Linha");
                    gerarGrafico('chartLinha', 'line', linha.map(l => l.Rotulo), linha.map(l => l.Valor), '#8b5cf6', false);

                    const funil = dados.filter(d => d.Tipo === "Funil");
                    gerarGrafico('chartFunil', 'bar', funil.map(f => f.Rotulo), funil.map(f => f.Valor), ['#4c1d95', '#7c3aed', '#a78bfa'], true);

                    const alertas = dados.filter(d => d.Tipo === "Alerta");
                    document.getElementById('alerta-count').innerText = alertas.length + " Ativos";
                    document.getElementById('lista-alertas').innerHTML = alertas.map(a => `
                        <div class="flex items-start gap-3 p-3 bg-slate-50 rounded-lg border border-slate-100">
                            <div class="text-red-500 font-bold">!</div>
                            <div><p class="text-sm font-bold">${a.Rotulo}</p><p class="text-xs text-slate-500">${a.Valor}</p></div>
                        </div>
                    `).join('');
                }
            });
        }

        function gerarGrafico(id, tipo, labels, valores, cores, isHorizontal) {
            new Chart(document.getElementById(id), {
                type: tipo,
                data: {
                    labels: labels,
                    datasets: [{
                        data: valores,
                        backgroundColor: cores,
                        borderColor: tipo === 'line' ? '#8b5cf6' : 'transparent',
                        fill: tipo === 'line',
                        borderRadius: 5,
                        tension: 0.4
                    }]
                },
                options: {
                    indexAxis: isHorizontal ? 'y' : 'x',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { grid: { display: false } }, y: { grid: { borderDash: [5, 5] } } }
                }
            });
        }
        carregarDados();
    </script>
</body>
</html>
