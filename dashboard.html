<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard RH - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #f1f5f9; color: #1e293b; font-family: 'Segoe UI', sans-serif; padding: 30px; margin: 0; }
        .page-container { max-width: 1000px; margin: auto; }
        .back-btn { text-decoration: none; font-size: 0.95rem; color: #0284c7; background: #e0f2fe; padding: 10px 18px; border-radius: 8px; font-weight: 500; display: inline-flex; align-items: center; margin-bottom: 25px; }
        h1.main-title { color: #1e293b; font-weight: 800; text-align: center; margin-bottom: 40px; text-transform: uppercase; font-size: 1.8rem; }
        .card { background: #ffffff; border-radius: 16px; padding: 35px; margin-bottom: 30px; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        h2.chart-title { color: #1e40af; margin: 0; font-size: 1.3rem; text-transform: uppercase; font-weight: 700; }
        .sub-title { color: #94a3b8; font-size: 0.9rem; margin-top: 5px; margin-bottom: 30px; }
        .grid-info { display: grid; grid-template-columns: 1fr 280px; gap: 30px; align-items: center; }
        .info-box { background: #e0f2fe; padding: 22px; border-radius: 12px; border-left: 5px solid #0284c7; font-size: 0.92rem; line-height: 1.6; color: #1f2937; }
        .info-box b { color: #0369a1; display: block; margin-bottom: 10px; text-transform: uppercase; font-size: 0.85rem; }
        .chart-container { position: relative; height: 380px; width: 100%; }
        @media (max-width: 850px) { .grid-info { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="page-container">
        <a href="index.html" class="back-btn">← Voltar para perfis</a>
        <h1 class="main-title">GESTÃO DE INDICADORES - DHO CURITIBA</h1>
        <div id="container-graficos"></div>
    </div>

<script>
    Chart.register(ChartDataLabels);

    const planilhaDrive = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?output=csv";

    function limparNumero(v) {
        if (!v || v.toString().trim() === "") return 0;
        let n = v.toString().replace(/\s/g, '').replace(',', '.');
        return parseFloat(n) || 0;
    }

    function normalizar(txt) {
        return txt ? txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : "";
    }

    function criarGrafico(tituloExibicao, dadosFiltrados, notaTecnica = "") {
        const container = document.getElementById('container-graficos');
        const idUnique = Math.random().toString(36).substr(2, 9);
        
        container.innerHTML += `
            <div class="card">
                <h2 class="chart-title">${tituloExibicao}</h2>
                <p class="sub-title">Grupo Coplac | Performance</p>
                <div class="grid-info">
                    <div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div>
                    <div class="info-box"><b>DETALHAMENTO</b> ${notaTecnica}</div>
                </div>
            </div>`;
        
        setTimeout(() => {
            const ctx = document.getElementById(`chart-${idUnique}`);
            const labels = [...new Set(dadosFiltrados.map(ln => ln.mes || ln.Mes))];
            
            const metas = labels.map(mes => {
                const r = dadosFiltrados.find(ln => (ln.mes || ln.Mes) === mes);
                return r ? limparNumero(r.Objetivo || r['10'] || r['430']) : 0;
            });

            const dadosValores = labels.map(mes => {
                const r = dadosFiltrados.find(ln => (ln.mes || ln.Mes) === mes);
                return r ? limparNumero(r.Qtd || r['Valor Real'] || r['9105']) : 0;
            });

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { 
                            label: 'Realizado', 
                            data: dadosValores, 
                            backgroundColor: '#1e40af', 
                            borderRadius: 6 
                        },
                        { 
                            label: 'Meta', 
                            data: metas, 
                            type: 'line', 
                            borderColor: '#546e7a', 
                            borderWidth: 3, 
                            fill: false, 
                            pointRadius: 5, 
                            datalabels: { display: false } 
                        }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' },
                        datalabels: {
                            color: '#1e293b', font: { weight: 'bold' },
                            anchor: 'end', align: 'top',
                            formatter: (val) => val > 0 ? val.toLocaleString('pt-BR') : ''
                        }
                    },
                    scales: { y: { beginAtZero: true, grace: '15%' } }
                }
            });
        }, 150);
    }

    Papa.parse(planilhaDrive, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            document.getElementById('container-graficos').innerHTML = "";

            const config = [
                { chave: "HORA-HOMEM TREINAMENTO", titulo: "HORA-HOMEM DE TREINAMENTO", nota: "Total de horas de treinamento realizadas pelos colaboradores no período." },
                { chave: "HORAS DE TREINAMENTO", titulo: "HORAS DE TREINAMENTO", nota: "Horas de treinamentos programados e realizados no mês" },
                { chave: "APROVADOS EM TREINAMENTO", titulo: "APROVADOS EM TREINAMENTO", nota: "%Aprovados em Treinamento" },
                { chave: "TURNOVER PA", titulo: "TURNOVER PA - 03", nota: "Desligados > 180 Dias" },
                { chave: "ABSENTEISMO", titulo: "ABSENTEÍSMO PA - 03", nota: "Total de Horas Ausentes / Horas Programadas" }
            ];

            config.forEach(item => {
                let filtrados = dados.filter(ln => normalizar(ln.Processo || ln.indicadores || "").includes(normalizar(item.chave)));
                if (filtrados.length > 0) criarGrafico(item.titulo, filtrados, item.nota);
            });
            
            // Lógica de consolidados MOD/MOI permanece a mesma aqui...
        }
    });
</script>
</body>
</html>
