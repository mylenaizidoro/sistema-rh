<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard DHO - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; margin: 0; }
        .card { background: #1e293b; border-radius: 15px; padding: 25px; max-width: 900px; margin: 40px auto; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin: 0; }
        .sub { color: #94a3b8; margin-bottom: 25px; }
        .chart-container { position: relative; height: 400px; width: 100%; }
        .back-btn { color: #94a3b8; text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; display: inline-block; }
        #debug { color: #fbbf24; background: rgba(251, 191, 36, 0.1); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #fbbf24; display: none; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <a href="index.html" class="back-btn">← Voltar para perfis</a>
    <h2>Indicadores de DHO</h2>
    <p class="sub">Ada — Treinamento e Desenvolvimento | Grupo Coplac</p>
    
    <div id="debug"></div>

    <div class="chart-container">
        <canvas id="graficoDHO"></canvas>
    </div>
</div>

<script>
    const debugDiv = document.getElementById('debug');

    function limparValor(v) {
        if (!v) return 0;
        let n = v.toString().replace(/[^\d,.-]/g, '').replace(',', '.');
        return parseFloat(n) || 0;
    }

    Papa.parse("dados.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            
            // Filtro ultra-flexível: procura "TREINAMENTO" em qualquer coluna
            const treinoData = dados.filter(linha => {
                return Object.values(linha).some(val => 
                    val && val.toString().toUpperCase().includes("TREINAMENTO")
                );
            });

            if (treinoData.length === 0) {
                debugDiv.style.display = "block";
                debugDiv.innerHTML = "<b>ERRO DE LEITURA:</b> Não encontrei 'TREINAMENTO'.<br>Colunas lidas: " + Object.keys(dados[0] || {}).join(" | ");
                return;
            }

            // Mapeia colunas tentando variações de nomes (Mês/Mes, Valor Real/Valor, etc)
            const meses = treinoData.map(d => d.Mês || d.Mes || d.MES || "S/D");
            const reais = treinoData.map(d => limparValor(d['Valor Real'] || d.Valor || d.VALOR_REAL));
            const metas = treinoData.map(d => limparValor(d.Objetivo || d.META || d.OBJETIVO));

            new Chart(document.getElementById('graficoDHO'), {
                type: 'bar',
                data: {
                    labels: meses,
                    datasets: [
                        { label: 'Horas Realizadas', data: reais, backgroundColor: '#38bdf8', borderRadius: 5 },
                        { label: 'Meta', data: metas, type: 'line', borderColor: '#ef4444', borderWidth: 3, fill: false }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        x: { ticks: { color: '#94a3b8' } }
                    },
                    plugins: { legend: { labels: { color: '#f1f5f9' } } }
                }
            });
        },
        error: function() {
            debugDiv.style.display = "block";
            debugDiv.innerText = "ERRO: O arquivo dados.csv não pôde ser carregado do GitHub.";
        }
    });
</script>
</body>
</html>
