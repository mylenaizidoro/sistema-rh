<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard RH - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: #ffffff; border-radius: 16px; padding: 30px; max-width: 950px; margin: 25px auto; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .grid-info { display: grid; grid-template-columns: 1fr 280px; gap: 25px; align-items: center; }
        .info-box { background: #f1f5f9; padding: 20px; border-radius: 12px; border-left: 5px solid #0284c7; font-size: 0.9rem; line-height: 1.6; color: #475569; }
        .info-box b { color: #0284c7; display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 0.8rem; }
        h1 { color: #0f172a; font-weight: 700; text-align: center; margin-bottom: 30px; text-transform: uppercase; }
        h2 { color: #0284c7; margin: 0; font-size: 1.4rem; text-transform: uppercase; }
        .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 25px; }
        .chart-container { position: relative; height: 380px; width: 100%; }
        .back-btn { color: #64748b; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 20px; }
        @media (max-width: 768px) { .grid-info { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div style="max-width: 950px; margin: auto;">
        <a href="index.html" class="back-btn">← Voltar para perfis</a>
        <h1>GESTÃO DE INDICADORES - DHO CURITIBA</h1>
    </div>
    <div id="container-graficos"></div>

<script>
    Chart.register(ChartDataLabels);

    const planilhaDrive = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?output=csv";

    function limparNumero(v) {
        if (!v || v.toString().trim() === "") return 0;
        let n = v.toString().replace(/\s/g, '').replace(',', '.');
        return parseFloat(n) || 0;
    }

    function normalizar(txt) {
        return txt ? txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : "";
    }

    function criarGrafico(tituloExibicao, dadosFiltrados, isStacked = false) {
        const container = document.getElementById('container-graficos');
        const idUnique = Math.random().toString(36).substr(2, 9);
        container.innerHTML += `<div class="card"><h2>${tituloExibicao}</h2><p class="sub">Grupo Coplac | Performance</p><div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div></div>`;
        
        setTimeout(() => {
            const ctx = document.getElementById(`chart-${idUnique}`);
            const labels = [...new Set(dadosFiltrados.map(ln => ln.mes))];
            let datasets = [];

            if (isStacked) {
                const tipos = [...new Set(dadosFiltrados.map(ln => ln.Indicador))];
                const cores = ['#0ea5e9', '#f59e0b', '#ef4444'];
                datasets = tipos.map((tipo, i) => ({
                    label: tipo,
                    data: labels.map(mes => {
                        const r = dadosFiltrados.find(ln => ln.mes === mes && ln.Indicador === tipo);
                        return r ? limparNumero(r['Valor Real']) : 0;
                    }),
                    backgroundColor: cores[i % cores.length],
                    borderRadius: 6
                }));
            } else {
                const valoresReais = labels.map(mes => {
                    const r = dadosFiltrados.find(ln => ln.mes === mes);
                    return r ? limparNumero(r['Valor Real']) : 0;
                });
                const metas = labels.map(mes => {
                    const r = dadosFiltrados.find(ln => ln.mes === mes);
                    return r ? limparNumero(r.Objetivo) : 0;
                });
                
                const coresBarras = valoresReais.map((valor, index) => {
                    const meta = metas[index];
                    const t = normalizar(tituloExibicao);
                    if (t.includes("ABSENTEISMO") || t.includes("TURNOVER")) return (valor <= meta || meta === 0) ? '#22c55e' : '#ef4444';
                    return valor >= meta ? '#22c55e' : '#ef4444';
                });

                datasets = [
                    { label: 'Realizado', data: valoresReais, backgroundColor: coresBarras, borderRadius: 6 },
                    { label: 'Meta', data: metas, type: 'line', borderColor: '#475569', borderWidth: 3, fill: false, pointRadius: 4, datalabels: { display: false } }
                ];
            }

            new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' },
                        datalabels: {
                            color: '#475569', font: { weight: 'bold' },
                            formatter: (value) => value !== 0 ? value.toLocaleString('pt-BR') : ''
                        }
                    },
                    scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grace: '15%' } }
                }
            });
        }, 150);
    }

    function criarGraficoConsolidado(titulo, dadosMOD, dadosMOI, notaTecnica) {
        const container = document.getElementById('container-graficos');
        const idUnique = Math.random().toString(36).substr(2, 9);
        container.innerHTML += `<div class="card"><h2>${titulo}</h2><p class="sub">Grupo Coplac | Unificado</p><div class="grid-info"><div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div><div class="info-box"><b>DETALHAMENTO</b> ${notaTecnica}</div></div></div>`;
        
        setTimeout(() => {
            const ctx = document.getElementById(`chart-${idUnique}`);
            const labels = [...new Set([...dadosMOD.map(d => d.mes), ...dadosMOI.map(d => d.mes)])].sort();
            const vMOD = labels.map(m => limparNumero(dadosMOD.find(ln => ln.mes === m)?.['Valor Real']));
            const vMOI = labels.map(m => limparNumero(dadosMOI.find(ln => ln.mes === m)?.['Valor Real']));
            const meta = labels.map(m => (limparNumero(dadosMOD.find(ln => ln.mes === m)?.Objetivo) || 0) + (limparNumero(dadosMOI.find(ln => ln.mes === m)?.Objetivo) || 0));

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'MOI', data: vMOI, backgroundColor: '#cbd5e1', stack: 's1' },
                        { label: 'MOD', data: vMOD, backgroundColor: '#475569', stack: 's1' },
                        { label: 'Meta Total', data: meta, type: 'line', borderColor: '#000', borderWidth: 2, pointRadius: 5, datalabels: { display: false } }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        datalabels: {
                            color: '#000', font: { weight: 'bold' },
                            formatter: (val, ctx) => {
                                if (ctx.datasetIndex === 1) { 
                                    const total = (vMOD[ctx.dataIndex] || 0) + (vMOI[ctx.dataIndex] || 0);
                                    return total > 0 ? total : '';
                                }
                                return '';
                            },
                            anchor: 'end', align: 'top'
                        }
                    },
                    scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true, grace: '15%' } }
                }
            });
        }, 150);
    }

    Papa.parse(planilhaDrive + "&t=" + new Date().getTime(), {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            document.getElementById('container-graficos').innerHTML = "";

            // 1. INDICADORES TRADICIONAIS
            const config = [
                { chave: "HORAS DE TREINAMENTO", titulo: "HORAS DE TREINAMENTO" },
                { chave: "APROVADOS EM TREINAMENTO", titulo: "APROVADOS EM TREINAMENTO" },
                { chave: "TURNOVER PA", titulo: "TURNOVER PA - 03" },
                { chave: "UNIVERSAL", titulo: "TURNOVER - CÁLCULO UNIVERSAL" },
                { chave: "ABSENTEISMO", titulo: "ABSENTEÍSMO PA - 03" }
            ];

            config.forEach(item => {
                let filtrados = dados.filter(ln => normalizar(ln.Processo).includes(normalizar(item.chave)));
                if (filtrados.length > 0) criarGrafico(item.titulo, filtrados);
            });

            // 2. CONSOLIDADO 15 DIAS (BUSCA POR SOLICITACAO E TURNOVER_MOI)
            const d15MOD = dados.filter(ln => normalizar(ln.Processo).includes("SOLICITACAO DE DESLIGAMENTOS") && !ln.Processo.includes("16"));
            const d15MOI = dados.filter(ln => normalizar(ln.Processo) === "TURNOVER_MOI");
            if (d15MOD.length > 0 || d15MOI.length > 0) {
                criarGraficoConsolidado("TURNOVER - SOLICITAÇÃO 15 DIAS (CONSOLIDADO)", d15MOD, d15MOI, "Soma MOD + MOI em 15 dias.");
            }

            // 3. CONSOLIDADO 16 A 30 DIAS (BUSCA PELA NOVA PADRONIZAÇÃO)
            const d1630MOD = dados.filter(ln => normalizar(ln.Processo).includes("16 A 30") && normalizar(ln.Indicador) === "MOD");
            const d1630MOI = dados.filter(ln => normalizar(ln.Processo).includes("16 A 30") && normalizar(ln.Indicador) === "MOI");
            
            if (d1630MOD.length > 0 || d1630MOI.length > 0) {
                criarGraficoConsolidado("TURNOVER - SOLICITAÇÃO 16 A 30 DIAS (CONSOLIDADO)", d1630MOD, d1630MOI, "Soma MOD + MOI entre 16 e 30 dias.");
            }
        }
    });
</script>
</body>
</html>
