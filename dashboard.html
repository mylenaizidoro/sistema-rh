<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard RH - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #f1f5f9; color: #1e293b; font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; }
        .header-container { max-width: 1100px; margin: auto; }
        h1 { color: #0f172a; font-weight: 800; text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: -0.5px; }
        .controls { text-align: center; margin-bottom: 30px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; align-items: center; }
        .btn { padding: 10px 24px; border: 1px solid #e2e8f0; background: white; color: #475569; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn.active { background: #0284c7; color: white; border-color: #0284c7; }
        .select-turno { padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-weight: 600; cursor: pointer; }
        .card { background: #ffffff; border-radius: 16px; padding: 30px; max-width: 1000px; margin: 25px auto; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .chart-container { position: relative; height: 420px; width: 100%; }
        h2 { color: #0f172a; margin: 0; font-size: 1.1rem; text-transform: uppercase; font-weight: 700; }
        .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 20px; }
        @media print { .controls { display: none; } }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>GESTÃO DE INDICADORES - DHO CURITIBA</h1>
        
        <div class="controls">
            <button class="btn active" onclick="filtrarAno('TODOS', this)">Ver Todos</button>
            <button class="btn" onclick="filtrarAno('2025', this)">2025</button>
            <button class="btn" onclick="filtrarAno('2026', this)">2026</button>

            <select id="selectTurno" class="select-turno" onchange="filtrarTurno()">
                <option value="TODOS">Geral (Soma Turnos)</option>
                <option value="1º TURNO">1º Turno</option>
                <option value="2º TURNO">2º Turno</option>
                <option value="3º TURNO">3º Turno</option>
            </select>
            
            <button class="btn" style="background: #0f172a; color: white;" onclick="window.print()">Exportar PDF</button>
        </div>
    </div>

    <div id="container-graficos"></div>

<script>
    Chart.register(ChartDataLabels);

    const planilhaDrive = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?output=csv";

    let dadosGlobais = [];
    let anoSelecionado = 'TODOS';
    let turnoSelecionado = 'TODOS';

    const labelsAnos = [];
    for(let m=1; m<=12; m++) labelsAnos.push(`${m.toString().padStart(2,'0')}/2025`);
    for(let m=1; m<=12; m++) labelsAnos.push(`${m.toString().padStart(2,'0')}/2026`);

    function limpar(v) { return v ? parseFloat(v.toString().replace(/\s/g, '').replace(',', '.')) || 0 : 0; }
    function norm(t) { return t ? t.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : ""; }

    function filtrarAno(ano, btn) {
        anoSelecionado = ano;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderizar();
    }

    function filtrarTurno() {
        turnoSelecionado = document.getElementById('selectTurno').value;
        renderizar();
    }

    function criarGraficoMODMOI(titulo, termoProcesso) {
        const labelsExibicao = anoSelecionado === 'TODOS' ? labelsAnos : labelsAnos.filter(l => l.includes(anoSelecionado));
        
        const filtrarSetor = (setor) => dadosGlobais.filter(ln => {
            const matchProc = norm(ln.Processo).includes(norm(termoProcesso));
            const matchAno = (anoSelecionado === 'TODOS' || ln.mes.includes(anoSelecionado));
            const ind = norm(ln.Indicador);
            
            const matchSetor = ind.includes(setor); 
            let matchTurno = true;
            if (turnoSelecionado !== 'TODOS') {
                matchTurno = ind.includes(norm(turnoSelecionado));
            }
            return matchProc && matchAno && matchSetor && matchTurno;
        });

        const dMOD = filtrarSetor("MOD");
        const dMOI = filtrarSetor("MOI");

        if (dMOD.length === 0 && dMOI.length === 0) return;

        const id = Math.random().toString(36).substr(2, 9);
        document.getElementById('container-graficos').innerHTML += `
            <div class="card">
                <h2>${titulo} ${turnoSelecionado !== 'TODOS' ? '- ' + turnoSelecionado : ''}</h2>
                <p class="sub">Comparativo MOD vs MOI</p>
                <div class="chart-container"><canvas id="${id}"></canvas></div>
            </div>`;

        setTimeout(() => {
            const somarMes = (lista) => labelsExibicao.map(m => {
                return lista.filter(ln => ln.mes === m).reduce((acc, curr) => acc + limpar(curr['Valor Real'] || curr.Qtd), 0);
            });

            const metas = labelsExibicao.map(m => {
                const itens = dMOD.concat(dMOI).filter(ln => ln.mes === m);
                return itens.length > 0 ? limpar(itens[0].Objetivo) : null;
            });

            new Chart(document.getElementById(id), {
                type: 'bar',
                data: {
                    labels: labelsExibicao,
                    datasets: [
                        { label: 'MOI', data: somarMes(dMOI), backgroundColor: '#94a3b8', stack: 's1' },
                        { label: 'MOD', data: somarMes(dMOD), backgroundColor: '#334155', stack: 's1' },
                        { label: 'Meta', data: metas, type: 'line', borderColor: '#f59e0b', borderWidth: 2, fill: false, pointRadius: 4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        datalabels: { 
                            color: '#fff', 
                            anchor: 'center',
                            formatter: (v) => v > 0 ? v : '' 
                        } 
                    },
                    scales: { x: { stacked: true }, y: { stacked: true } }
                }
            });
        }, 100);
    }

    function renderizar() {
        document.getElementById('container-graficos').innerHTML = "";
        
        // Aqui estão todos os seus indicadores conforme a planilha
        const processos = [
            { p: "SOLICITACAO DE DESLIGAMENTO ATE 15", t: "TURNOVER - SOLICITAÇÃO ATÉ 15 DIAS" },
            { p: "SOLICITACAO DE DESLIGAMENTO 16 A 30", t: "TURNOVER - SOLICITAÇÃO 16 A 30 DIAS" },
            { p: "SOLICITACAO DE DESLIGAMENTO 31 A 90", t: "TURNOVER - SOLICITAÇÃO 31 A 90 DIAS" },
            { p: "SOLICITACAO DE DESLIGAMENTO ACIMA DE 90", t: "TURNOVER - SOLICITAÇÃO ACIMA DE 90 DIAS" },
            { p: "PEDIDOS DE DESLIGAMENTO MES", t: "TURNOVER - PEDIDOS TOTAIS NO MÊS" },
            { p: "INICIATIVA DE DESLIGAMENTO DA EMPRESA dentro de 15 dias", t: "TURNOVER - EMPRESA ATÉ 15 DIAS" },
            { p: "INICIATIVA DE DESLIGAMENTO DA EMPRESA dentro de 30 dias", t: "TURNOVER - EMPRESA ATÉ 30 DIAS" },
            { p: "INICIATIVA DE DESLIGAMENTO DA EMPRESA de 31 a 90 dias", t: "TURNOVER - EMPRESA 31 A 90 DIAS" },
            { p: "INICIATIVA DE DESLIGAMENTO DA EMPRESA geral mes", t: "TURNOVER - EMPRESA GERAL MÊS" },
            { p: "ABSENTEISMO", t: "ABSENTEÍSMO" }
        ];

        processos.forEach(proc => criarGraficoMODMOI(proc.t, proc.p));
    }

    Papa.parse(planilhaDrive + "?t=" + new Date().getTime(), {
        download: true, header: true, skipEmptyLines: true,
        complete: function(r) { dadosGlobais = r.data; renderizar(); }
    });
</script>
</body>
</html>
