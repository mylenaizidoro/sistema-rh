<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard RH - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: #ffffff; border-radius: 16px; padding: 30px; max-width: 950px; margin: 25px auto; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .grid-info { display: grid; grid-template-columns: 1fr 280px; gap: 25px; align-items: center; }
        .info-box { background: #f1f5f9; padding: 20px; border-radius: 12px; border-left: 5px solid #0284c7; font-size: 0.9rem; line-height: 1.6; color: #475569; }
        .info-box b { color: #0284c7; display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 0.8rem; }
        h1 { color: #0f172a; font-weight: 700; text-align: center; margin-bottom: 30px; text-transform: uppercase; }
        h2 { color: #0284c7; margin: 0; font-size: 1.2rem; text-transform: uppercase; }
        .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 25px; }
        .chart-container { position: relative; height: 380px; width: 100%; }
        .back-btn { color: #64748b; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div style="max-width: 950px; margin: auto;">
        <a href="index.html" class="back-btn">← Voltar para perfis</a>
        <h1>GESTÃO DE INDICADORES - DHO CURITIBA</h1>
    </div>

    <div id="container-graficos"></div>

<script>
    Chart.register(ChartDataLabels);

    const planilhaDrive = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?output=csv";

    function limparNumero(v) {
        if (!v || v.toString().trim() === "") return 0;
        let n = v.toString().replace(/\s/g, '').replace(',', '.');
        return parseFloat(n) || 0;
    }

    function normalizar(txt) {
        return txt ? txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : "";
    }

    function criarGraficoPerformance(itemConfig, dadosGerais) {
        const container = document.getElementById('container-graficos');
        const idUnique = Math.random().toString(36).substr(2, 9);
        const dadosFiltrados = dadosGerais.filter(ln => normalizar(ln.Processo).includes(normalizar(itemConfig.chave)));

        if (dadosFiltrados.length === 0) return;

        // Verifica se este indicador deve exibir %
        const exibirPorcentagem = itemConfig.chave.includes("ABSENTEISMO") || 
                                 itemConfig.chave.includes("TURNOVER") || 
                                 itemConfig.chave.includes("UNIVERSAL") || 
                                 itemConfig.chave.includes("APROVADOS");

        container.innerHTML += `
            <div class="card">
                <h2>${itemConfig.titulo}</h2>
                <p class="sub">Grupo Coplac | Performance</p>
                <div class="grid-info">
                    <div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div>
                    <div class="info-box"><b>DETALHAMENTO</b> ${itemConfig.nota}</div>
                </div>
            </div>`;
        
        setTimeout(() => {
            const ctx = document.getElementById(`chart-${idUnique}`);
            const labels = [...new Set(dadosFiltrados.map(ln => ln.mes))];
            
            const metas = labels.map(mes => {
                const r = dadosFiltrados.find(ln => ln.mes === mes);
                return r ? limparNumero(r.Objetivo) : 0;
            });

            const dadosDentroMeta = [];
            const dadosForaMeta = [];

            labels.forEach((mes, index) => {
                const r = dadosFiltrados.find(ln => ln.mes === mes);
                const valor = r ? limparNumero(r['Valor Real'] || r.Qtd) : 0;
                const meta = metas[index];
                
                let atingiu = (itemConfig.tipo === "MENOR_MELHOR") ? (valor <= meta) : (valor >= meta);

                if (atingiu) {
                    dadosDentroMeta.push(valor);
                    dadosForaMeta.push(null);
                } else {
                    dadosDentroMeta.push(null);
                    dadosForaMeta.push(valor);
                }
            });

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Dentro da meta', data: dadosDentroMeta, backgroundColor: '#22c55e', borderRadius: 6, stack: 's' },
                        { label: 'Fora da meta', data: dadosForaMeta, backgroundColor: '#ef4444', borderRadius: 6, stack: 's' },
                        { label: 'Meta', data: metas, type: 'line', borderColor: '#475569', borderWidth: 3, fill: false, pointRadius: 4, datalabels: { display: false } }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' },
                        datalabels: {
                            color: '#475569', font: { weight: 'bold' },
                            anchor: 'end', align: 'top',
                            formatter: (val) => {
                                if (val !== null && val !== 0) {
                                    return val.toLocaleString('pt-BR') + (exibirPorcentagem ? '%' : '');
                                }
                                return '';
                            }
                        }
                    },
                    scales: { 
                        y: { 
                            beginAtZero: true, 
                            grace: '15%',
                            ticks: {
                                callback: function(value) {
                                    return value + (exibirPorcentagem ? '%' : '');
                                }
                            }
                        } 
                    }
                }
            });
        }, 150);
    }

    function criarGraficoConsolidado(titulo, dadosMOD, dadosMOI) {
        const container = document.getElementById('container-graficos');
        const idUnique = Math.random().toString(36).substr(2, 9);

        container.innerHTML += `
            <div class="card">
                <h2>${titulo}</h2>
                <p class="sub">Grupo Coplac | Unificado</p>
                <div class="grid-info">
                    <div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div>
                    <div class="info-box"><b>DETALHAMENTO</b> Comparativo entre Mão de Obra Direta (MOD) e Indireta (MOI).</div>
                </div>
            </div>`;
        
        setTimeout(() => {
            const ctx = document.getElementById(`chart-${idUnique}`);
            const labels = [...new Set([...dadosMOD.map(d => d.mes), ...dadosMOI.map(d => d.mes)])].sort();
            const vMOD = labels.map(m => limparNumero(dadosMOD.find(ln => ln.mes === m)?.['Valor Real'] || dadosMOD.find(ln => ln.mes === m)?.Qtd));
            const vMOI = labels.map(m => limparNumero(dadosMOI.find(ln => ln.mes === m)?.['Valor Real'] || dadosMOI.find(ln => ln.mes === m)?.Qtd));
            const meta = labels.map(m => {
                const linha = dadosMOD.find(ln => ln.mes === m) || dadosMOI.find(ln => ln.mes === m);
                return limparNumero(linha?.Objetivo);
            });

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'MOI', data: vMOI, backgroundColor: '#cbd5e1', stack: 's1' },
                        { label: 'MOD', data: vMOD, backgroundColor: '#475569', stack: 's1' },
                        { label: 'Meta', data: meta, type: 'line', borderColor: '#000', borderWidth: 2, pointRadius: 5, datalabels: { display: false } }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        datalabels: {
                            color: '#fff', font: { weight: 'bold', size: 10 },
                            formatter: (val) => val > 0 ? val.toLocaleString('pt-BR') + '%' : '',
                            anchor: 'center', align: 'center', display: true
                        }
                    },
                    scales: { 
                        x: { stacked: true }, 
                        y: { 
                            stacked: true, 
                            beginAtZero: true, 
                            grace: '20%',
                            ticks: {
                                callback: function(value) { return value + '%'; }
                            }
                        } 
                    }
                }
            });
        }, 150);
    }

    Papa.parse(planilhaDrive + "&t=" + new Date().getTime(), {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            document.getElementById('container-graficos').innerHTML = "";

            // --- SEQUÊNCIA COM PORCENTAGENS APLICADAS ---

            // 1. ABSENTEISMO (%)
            criarGraficoPerformance({ chave: "ABSENTEISMO", titulo: "ABSENTEÍSMO PA - 03", tipo: "MENOR_MELHOR", nota: "% Absenteísmo: Total de Horas Ausentes / Total de Horas Programadas para Trabalhar." }, dados);

            // 2. TURNOVER PA-03 (%)
            criarGraficoPerformance({ chave: "TURNOVER PA", titulo: "TURNOVER PA - 03", tipo: "MENOR_MELHOR", nota: "%TurnOver = (Qtde Colaboradores Desligados > 180 Dias / Qtde Colaboradores no Último Dia do Mês) * 100" }, dados);

            // 3. TURNOVER CALCULO (%)
            criarGraficoPerformance({ chave: "UNIVERSAL", titulo: "TURNOVER - CÁLCULO UNIVERSAL", tipo: "MENOR_MELHOR", nota: "(Admissões + Desligamentos) ÷ 2 ÷ Total de colaboradores x 100" }, dados);

            // --- GRUPO CONSOLIDADO (TODOS COM %) ---
            const consolidadosConfig = [
                { termo: "SOLICITACAO DE DESLIGAMENTO 16 A 30", titulo: "TURNOVER - SOLICITAÇÃO DE DESLIGAMENTO 16 A 30 DIAS (CONSOLIDADO)" },
                { termo: "SOLICITACAO DE DESLIGAMENTO 31 A 90", titulo: "TURNOVER - SOLICITAÇÃO DE DESLIGAMENTO 31 A 90 DIAS (CONSOLIDADO)" },
                { termo: "SOLICITACAO DE DESLIGAMENTO ACIMA DE 90", titulo: "TURNOVER - SOLICITAÇÃO DE DESLIGAMENTO ACIMA DE 90 DIAS (CONSOLIDADO)" },
                { termo: "PEDIDOS DE DESLIGAMENTO MES", titulo: "TURNOVER - SOLICITAÇÃO DE DESLIGAMENTO GERAL NO MÊS (CONSOLIDADO)" },
                { termo: "INICIATIVA DE DESLIGAMENTO DA EMPRESA dentro de 15 dias", titulo: "TURNOVER - INICIATIVA EMPRESA ATÉ 15 DIAS (CONSOLIDADO)" },
                { termo: "INICIATIVA DE DESLIGAMENTO DA EMPRESA dentro de 30 dias", titulo: "TURNOVER - INICIATIVA EMPRESA ATÉ 30 DIAS (CONSOLIDADO)" },
                { termo: "INICIATIVA DE DESLIGAMENTO DA EMPRESA de 31 a 90 dias", titulo: "TURNOVER - INICIATIVA EMPRESA 31 A 90 DIAS (CONSOLIDADO)" },
                { termo: "INICIATIVA DE DESLIGAMENTO DA EMPRESA geral mes", titulo: "TURNOVER - INICIATIVA EMPRESA GERAL NO MÊS (CONSOLIDADO)" }
            ];

            consolidadosConfig.forEach(p => {
                const dMOD = dados.filter(ln => normalizar(ln.Processo).includes(normalizar(p.termo)) && normalizar(ln.Indicador) === "MOD");
                const dMOI = dados.filter(ln => normalizar(ln.Processo).includes(normalizar(p.termo)) && normalizar(ln.Indicador) === "MOI");
                if (dMOD.length || dMOI.length) {
                    criarGraficoConsolidado(p.titulo, dMOD, dMOI);
                }
            });

            // 4. HORAS DE TREINAMENTO (Número Inteiro)
            criarGraficoPerformance({ chave: "HORAS DE TREINAMENTO", titulo: "HORAS DE TREINAMENTO", tipo: "MAIOR_MELHOR", nota: "Horas de treinamentos programados e realizados no mês." }, dados);

            // 5. APROVADOS EM TREINAMENTO (%)
            criarGraficoPerformance({ chave: "APROVADOS EM TREINAMENTO", titulo: "APROVADOS EM TREINAMENTO", tipo: "MAIOR_MELHOR", nota: "%Aprovados em Treinamento = (Qtde Colaboradores Aprovados / Qtde Colaboradores Avaliados) * 100" }, dados);

            // 6. PLANO DE VALORIZAÇÃO INTERNA (Número Inteiro)
            criarGraficoPerformance({ chave: "RETENÇÃO PLANO DE VALORIZAÇÃO INTERNA", titulo: "PLANO DE VALORIZAÇÃO INTERNA", tipo: "MAIOR_MELHOR", nota: "Acompanhamento de promoções internas e meritocracia." }, dados);
        }
    });
</script>
</body>
</html>
