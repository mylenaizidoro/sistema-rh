<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH Command Center - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-slate-100 flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#1a2b4b] text-white flex flex-col p-6">
        <div class="text-2xl font-bold mb-10 flex items-center gap-2">
            <span class="bg-blue-500 p-1 rounded text-sm">R</span> HR Core
        </div>
        <nav class="space-y-4 flex-1">
            <a href="#" class="block bg-blue-600 p-2 rounded-md">Command Center</a>
            <a href="#" class="block text-slate-400 hover:text-white transition">Recrutamento</a>
            <a href="#" class="block text-slate-400 hover:text-white transition">Admissões</a>
            <a href="#" class="block text-slate-400 hover:text-white transition">Operações RH</a>
            <a href="#" class="block text-slate-400 hover:text-white transition">Treinamentos</a>
            <a href="#" class="block text-slate-400 hover:text-white transition">Analytics</a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">Dashboard de Vagas</h1>
            <div class="text-sm text-slate-500">Unidade: Sede Principal</div>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-semibold text-slate-700 mb-6">Vagas Abertas por Setor</h2>
            <div class="h-[400px]">
                <canvas id="chartSetor"></canvas>
            </div>
        </div>

        <p class="text-xs text-slate-400 mt-6 text-center">Dados sincronizados com dados.csv</p>
    </main>

    <script>
        function carregarDados() {
            Papa.parse("dados.csv", {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const labels = results.data.map(item => item.Setor);
                    const valores = results.data.map(item => parseFloat(item.Vagas));
                    gerarGrafico(labels, valores);
                }
            });
        }

        function gerarGrafico(labels, valores) {
            const ctx = document.getElementById('chartSetor').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Quantidade de Vagas',
                        data: valores,
                        backgroundColor: '#3b82f6', // Azul do Luiz
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: { grid: { display: false } },
                        y: { grid: { display: false } }
                    }
                }
            });
        }
        carregarDados();
    </script>
</body>
</html>
