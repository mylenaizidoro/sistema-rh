<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard RH - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: #1e293b; border-radius: 15px; padding: 20px; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin: 0; font-size: 1.2rem; text-transform: uppercase; }
        .sub { color: #94a3b8; font-size: 0.8rem; margin-bottom: 15px; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .back-btn { color: #94a3b8; text-decoration: none; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div style="max-width: 1200px; margin: auto;">
        <a href="index.html" class="back-btn">← Voltar para perfis</a>
        <h1 style="margin-bottom: 30px;">Gestão de Indicadores - PA-03</h1>
    </div>

    <div class="grid" id="dashboard-grid">
        </div>

<script>
    const planilhaDrive = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?output=csv";

    // Lista de processos que queremos monitorar (exatamente como no seu print)
    const processosAlvo = [
        { nome: "TURNOVER PA - 03", cor: "#a855f7" },
        { nome: "ABSENTEISMO PA - 03", cor: "#ec4899" },
        { nome: "HORAS DE TREINAMENTO", cor: "#38bdf8" },
        { nome: "RETENÇÃO PLANO DE VALORIZAÇÃO INTERNA", cor: "#10b981" }
    ];

    function limparNumero(v) {
        if (!v || v.trim() === "") return null;
        return parseFloat(v.replace(',', '.')) || 0;
    }

    function montarCard(processo) {
        const idHtml = processo.nome.replace(/\s+/g, '-').toLowerCase();
        document.getElementById('dashboard-grid').innerHTML += `
            <div class="card">
                <h2>${processo.nome}</h2>
                <p class="sub">Grupo Coplac | PA-03</p>
                <div class="chart-container"><canvas id="${idHtml}"></canvas></div>
            </div>`;
        return idHtml;
    }

    Papa.parse(planilhaDrive + "&cachebuster=" + new Date().getTime(), {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;

            processosAlvo.forEach(proc => {
                const idCanvas = montarCard(proc);
                const dadosFiltrados = dados.filter(ln => 
                    ln.Processo && ln.Processo.toUpperCase().includes(proc.nome.toUpperCase())
                );

                if (dadosFiltrados.length > 0) {
                    new Chart(document.getElementById(idCanvas), {
                        type: 'bar',
                        data: {
                            labels: dadosFiltrados.map(ln => ln.Mês),
                            datasets: [
                                { label: 'Realizado', data: dadosFiltrados.map(ln => limparNumero(ln['Valor Real'])), backgroundColor: proc.cor, borderRadius: 5 },
                                { label: 'Meta', data: dadosFiltrados.map(ln => limparNumero(ln.Objetivo)), type: 'line', borderColor: '#ef4444', borderWidth: 2, fill: false }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                                x: { ticks: { color: '#94a3b8' } }
                            },
                            plugins: { legend: { labels: { color: '#f1f5f9' } } }
                        }
                    });
                }
            });
        }
    });
</script>
</body>
</html>
