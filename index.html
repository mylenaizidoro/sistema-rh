<script>
    // 1. CONFIGURAÇÕES INICIAIS
    const urlPlanilha = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?gid=1728295734&single=true&output=csv";
    
    // COLE AQUI a URL que o Google gerou no botão "Implantar" (Web App)
    const urlAPI = "SUA_URL_DO_GOOGLE_APPS_SCRIPT_AQUI"; 
    
    let charts = {};

    // 2. FUNÇÃO PARA ENVIAR NOVA VAGA (INTEGRAÇÃO COM APPS SCRIPT)
    async function enviarVaga() {
        const btn = document.getElementById('btn-salvar');
        if (!btn) return;
        const originalText = btn.innerText;
        
        // Captura os dados do formulário
        const dados = {
            cargo: document.getElementById('vaga-cargo').value,
            setor: document.getElementById('vaga-setor').value,
            gestor: document.getElementById('vaga-gestor').value,
            salario: document.getElementById('vaga-salario').value,
            contrato: document.getElementById('vaga-contrato').value,
            turno: "Integral", 
            horario: document.getElementById('vaga-horario').value
        };

        // Validação
        if(!dados.cargo || !dados.setor) return alert("Preencha pelo menos Cargo e Setor!");

        btn.innerText = "Enviando...";
        btn.disabled = true;

        try {
            await fetch(urlAPI, {
                method: 'POST',
                mode: 'no-cors', // Necessário para evitar erros de CORS com Google
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });
            
            alert("Vaga enviada com sucesso!");
            
            // Fecha o modal (certifique-se que a função fecharModal existe no seu código)
            if (typeof fecharModal === "function") fecharModal();
            
            // Reseta o formulário
            const form = document.getElementById('form-vaga');
            if (form) form.reset();
            
            // Recarrega os dados para mostrar a nova vaga na tabela após 3 segundos
            // (O Google demora um pouco para atualizar o CSV publicado)
            setTimeout(carregarDados, 3000); 

        } catch (e) {
            alert("Erro ao conectar com a API: " + e.message);
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    // 3. FUNÇÕES DE NAVEGAÇÃO E RENDERIZAÇÃO (SEU CÓDIGO ORIGINAL)
    function trocarPagina(pagina) {
        const paginas = ['dashboard', 'vagas', 'triagem'];
        paginas.forEach(p => {
            const el = document.getElementById(`pagina-${p}`);
            const menu = document.getElementById(`menu-${p}`);
            if(el) el.classList.add('hidden');
            if(menu) menu.classList.remove('active-menu');
        });

        const pgAtual = document.getElementById(`pagina-${pagina}`);
        const menuAtual = document.getElementById(`menu-${pagina}`);
        if(pgAtual) pgAtual.classList.remove('hidden');
        if(menuAtual) menuAtual.classList.add('active-menu');
        
        const titulos = { 'dashboard': 'RH Command Center', 'vagas': 'Gestão de Vagas', 'triagem': 'Triagem de Candidatos' };
        document.getElementById('titulo-pagina').innerText = titulos[pagina];
    }

    function carregarDados() {
        Papa.parse(urlPlanilha, {
            download: true, 
            header: true, 
            skipEmptyLines: true,
            complete: function(results) {
                if (results.data) {
                    const dados = results.data.map(d => ({
                        Tipo: d.Tipo ? d.Tipo.trim() : "",
                        Rotulo: d.Rotulo ? d.Rotulo.trim() : "",
                        Valor: d.Valor ? d.Valor.trim() : ""
                    }));

                    renderizarDashboard(dados);
                    renderizarVagas(dados.filter(d => d.Tipo === "Vagas"));
                    renderizarTriagem(dados.filter(d => d.Tipo === "Triagem"));
                }
            }
        });
    }

    function renderizarVagas(vagas) {
        const tbody = document.getElementById('tabela-vagas-corpo');
        if (!tbody) return;

        // Nota: Quando você envia via formulário, o status inicial é "aberta" no Apps Script
        tbody.innerHTML = vagas.map(v => {
            const codigo = v.Rotulo; 
            const cargo = v.Valor;   
            // Aqui você pode expandir para pegar os outros dados se sua planilha CSV tiver colunas extras
            return `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                    <td class="px-8 py-5 text-blue-600 font-bold text-xs">${codigo}</td>
                    <td class="px-4 py-5 font-bold text-slate-800">${cargo}</td>
                    <td class="px-4 py-5 text-slate-500">Geral</td>
                    <td class="px-4 py-5">
                        <span class="badge-aberta">aberta</span>
                    </td>
                    <td class="px-8 py-5 text-right">
                        <div class="flex justify-end gap-3 text-slate-300">
                            <i class="fas fa-edit cursor-pointer hover:text-blue-500"></i>
                            <i class="fas fa-ellipsis-h cursor-pointer"></i>
                        </div>
                    </td>
                </tr>`;
        }).join('');
    }

    // ... (Mantenha suas funções renderizarDashboard, renderizarTriagem e criarGrafico iguais)

    function renderizarDashboard(dados) {
        const cards = dados.filter(d => d.Tipo === "Card");
        const container = document.getElementById('container-cards');
        if(container) {
            container.innerHTML = cards.map(c => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 card-border-blue">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">${c.Rotulo}</p>
                    <h3 class="text-2xl font-bold text-slate-800">${c.Valor}</h3>
                </div>`).join('');
        }
        
        criarGrafico('chartSetor', 'bar', dados.filter(d => d.Tipo === "Setor"), true);
        criarGrafico('chartLinha', 'line', dados.filter(d => d.Tipo === "Linha"), false);
        criarGrafico('chartFunil', 'bar', dados.filter(d => d.Tipo === "Funil"), true);

        const alertas = dados.filter(d => d.Tipo === "Alerta");
        const contAlerta = document.getElementById('cont-alertas');
        if(contAlerta) contAlerta.innerText = `${alertas.length} ATIVOS`;
        
        const listaAlerta = document.getElementById('lista-alertas');
        if(listaAlerta) {
            listaAlerta.innerHTML = alertas.map(a => `
                <div class="p-4 bg-orange-50 rounded-2xl flex gap-4 items-start border border-orange-100">
                    <div class="bg-white p-2 rounded-lg text-orange-500 shadow-sm"><i class="fas fa-exclamation-circle text-xs"></i></div>
                    <div>
                        <p class="text-[11px] font-bold text-slate-800">${a.Rotulo}</p>
                        <p class="text-[10px] text-slate-500 font-semibold uppercase">${a.Valor}</p>
                    </div>
                </div>`).join('');
        }
    }

    // Inicializa os dados
    carregarDados();
</script>
