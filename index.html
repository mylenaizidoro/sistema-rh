<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Core - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-item { cursor: pointer; transition: 0.3s; color: #94a3b8; }
        .sidebar-item:hover { background-color: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .active-menu { background-color: #2563eb !important; color: white !important; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#0a1629] text-white flex flex-col shadow-2xl z-10">
        <div class="p-6 text-2xl font-bold border-b border-slate-700">HR Core</div>
        <nav class="flex-1 p-4 space-y-2 mt-4 text-sm">
            <div id="menu-dashboard" onclick="trocarPagina('dashboard')" class="sidebar-item active-menu p-3 rounded-xl flex items-center gap-3">
                <i class="fas fa-th-large"></i> Dashboard
            </div>
            <div id="menu-triagem" onclick="trocarPagina('triagem')" class="sidebar-item p-3 rounded-xl flex items-center gap-3">
                <i class="fas fa-users"></i> Triagem
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b flex items-center justify-between px-8 shadow-sm">
            <h1 id="titulo-pagina" class="text-xl font-bold text-slate-800">Command Center</h1>
            <button onclick="abrirModal()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">
                <i class="fas fa-plus mr-2"></i> Nova Vaga
            </button>
        </header>

        <div id="pagina-dashboard" class="flex-1 overflow-y-auto p-8">
            <div id="container-cards" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8"></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100"><canvas id="chartSetor"></canvas></div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100"><canvas id="chartFunil"></canvas></div>
            </div>
        </div>

        <div id="pagina-triagem" class="flex-1 overflow-y-auto p-8 hidden">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="p-4 text-[11px] uppercase font-bold text-slate-400">Nome</th>
                            <th class="p-4 text-[11px] uppercase font-bold text-slate-400">Match</th>
                            <th class="p-4 text-[11px] uppercase font-bold text-slate-400">Status</th>
                        </tr>
                    </thead>
                    <tbody id="lista-triagem" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modal-vaga" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                <h2 class="text-xl font-bold text-slate-800">Abertura de Nova Vaga</h2>
                <button onclick="fecharModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-lg"></i></button>
            </div>

            <form id="form-vaga" class="p-8 space-y-5" onsubmit="event.preventDefault(); enviarVaga();">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Cargo</label>
                        <input type="text" id="vaga-cargo" required placeholder="Ex: Desenvolvedor React" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Setor</label>
                        <input type="text" id="vaga-setor" required placeholder="Ex: Tecnologia" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Gestor</label>
                        <input type="text" id="vaga-gestor" placeholder="Ex: João Silva" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tipo de Contrato</label>
                        <select id="vaga-contrato" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none">
                            <option value="CLT">CLT</option>
                            <option value="PJ">PJ</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Salário</label>
                        <input type="text" id="vaga-salario" placeholder="R$ 0,00" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none">
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="fecharModal()" class="flex-1 px-6 py-3 rounded-xl border border-slate-200 text-slate-500 font-bold text-sm hover:bg-slate-50 transition-all">Cancelar</button>
                    <button type="submit" id="btn-salvar" class="flex-1 px-6 py-3 rounded-xl bg-blue-600 text-white font-bold text-sm hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">Criar Vaga</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES - Substitua pelos seus links reais
        const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?gid=1728295734&single=true&output=csv";
        const urlAPI = "SUA_URL_DO_DEPLOY_AQUI"; // Pegue no Google Script

        let charts = {};

        function trocarPagina(pagina) {
            ['dashboard', 'triagem'].forEach(p => {
                document.getElementById(`pagina-${p}`).classList.add('hidden');
                document.getElementById(`menu-${p}`).classList.remove('active-menu');
            });
            document.getElementById(`pagina-${pagina}`).classList.remove('hidden');
            document.getElementById(`menu-${pagina}`).classList.add('active-menu');
        }

        function abrirModal() { document.getElementById('modal-vaga').classList.remove('hidden'); }
        function fecharModal() { document.getElementById('modal-vaga').classList.add('hidden'); }

        async function enviarVaga() {
            const btn = document.getElementById('btn-salvar');
            const dados = {
                cargo: document.getElementById('vaga-cargo').value,
                setor: document.getElementById('vaga-setor').value,
                gestor: document.getElementById('vaga-gestor').value,
                contrato: document.getElementById('vaga-contrato').value,
                salario: document.getElementById('vaga-salario').value,
                turno: "Integral",
                horario: "09:00 - 18:00"
            };

            btn.innerText = "Enviando...";
            btn.disabled = true;

            try {
                await fetch(urlAPI, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados) });
                alert("Vaga cadastrada com sucesso!");
                fecharModal();
                document.getElementById('form-vaga').reset();
                setTimeout(carregarDados, 3000);
            } catch (e) {
                alert("Erro ao conectar com a planilha.");
            } finally {
                btn.innerText = "Criar Vaga";
                btn.disabled = false;
            }
        }

        function carregarDados() {
            Papa.parse(urlCSV, {
                download: true, header: true,
                complete: function(results) {
                    const dados = results.data;
                    renderDashboard(dados);
                }
            });
        }

        function renderDashboard(dados) {
            const cards = dados.filter(d => d.Tipo === "card");
            document.getElementById('container-cards').innerHTML = cards.map(c => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 border-b-4 border-b-blue-500">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">${c.Rotulo}</p>
                    <h3 class="text-2xl font-bold text-slate-800">${c.Valor}</h3>
                </div>
            `).join('');

            const triagem = dados.filter(d => d.Tipo === "triagem");
            document.getElementById('lista-triagem').innerHTML = triagem.map(t => `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition-all">
                    <td class="p-4 font-semibold text-slate-700">${t.Rotulo}</td>
                    <td class="p-4 text-blue-600 font-bold">${t.Valor}</td>
                    <td class="p-4"><span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">Qualificado</span></td>
                </tr>
            `).join('');
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
