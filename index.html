<!DOCTYPE html>
<html>
<head>
    <title>Dashboard RH - Sistema</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body>
    <h1>Dashboard de Indicadores RH</h1>
    <div style="width: 80%; margin: auto;">
        <canvas id="meuGrafico"></canvas>
    </div>

    <script>
        // Caminho para o seu arquivo no GitHub
        const csvUrl = 'dados.csv';

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                const dados = results.data;
                
                // Filtrar apenas o processo que você quer, ex: "TOTAL DE DESLIGAMENTO"
                const filtrados = dados.filter(item => item.Processo === 'TOTAL DE DESLIGAMENTO');
                
                const meses = filtrados.map(item => item.Mês);
                const valoresReais = filtrados.map(item => item['Valor Real']);
                const objetivos = filtrados.map(item => item.Objetivo);

                const ctx = document.getElementById('meuGrafico').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: meses,
                        datasets: [{
                            label: 'Valor Real',
                            data: valoresReais,
                            backgroundColor: 'blue'
                        }, {
                            label: 'Objetivo',
                            data: objetivos,
                            backgroundColor: 'red'
                        }]
                    }
                });
            }
        });
    </script>
</body>
</html>
