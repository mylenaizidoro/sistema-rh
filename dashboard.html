<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard RH - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; }
        .card { background: #1e293b; border-radius: 15px; padding: 25px; max-width: 950px; margin: 20px auto; border: 1px solid #334155; }
        
        /* Layout para o indicador com info lateral */
        .grid-info { display: grid; grid-template-columns: 1fr 250px; gap: 20px; align-items: center; }
        .info-box { background: #0f172a; padding: 15px; border-radius: 10px; border-left: 4px solid #38bdf8; font-size: 0.9rem; line-height: 1.6; }
        .info-box b { color: #38bdf8; display: block; margin-bottom: 5px; }

        h2 { color: #38bdf8; margin: 0; font-size: 1.5rem; text-transform: uppercase; }
        .sub { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
        .chart-container { position: relative; height: 320px; width: 100%; }
        .back-btn { color: #94a3b8; text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; display: inline-block; }
        
        @media (max-width: 768px) { .grid-info { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div style="max-width: 950px; margin: auto;">
        <a href="index.html" class="back-btn">← Voltar para perfis</a>
        <h1 style="font-size: 1.8rem; margin-bottom: 10px;">Gestão de Indicadores PA-03</h1>
    </div>

    <div id="container-graficos"></div>

<script>
    const planilhaDrive = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?output=csv";

    function limparNumero(v) {
        if (!v || v.toString().trim() === "") return 0;
        let n = v.toString().replace(/\s/g, '').replace(',', '.');
        return parseFloat(n) || 0;
    }

    function normalizar(txt) {
        return txt ? txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : "";
    }

    function criarGrafico(tituloExibicao, dadosFiltrados, infoAdicional = null) {
        const container = document.getElementById('container-graficos');
        const idGrafico = btoa(tituloExibicao).replace(/[^a-z0-9]/gi, '');

        let htmlCartao = `
            <div class="card">
                <h2>${tituloExibicao}</h2>
                <p class="sub">Grupo Coplac | Performance</p>
                <div class="${infoAdicional ? 'grid-info' : ''}">
                    <div class="chart-container"><canvas id="chart-${idGrafico}"></canvas></div>
                    ${infoAdicional ? `<div class="info-box">${infoAdicional}</div>` : ''}
                </div>
            </div>`;

        container.innerHTML += htmlCartao;

        setTimeout(() => {
            const ctx = document.getElementById(`chart-${idGrafico}`);
            const labels = dadosFiltrados.map(ln => ln.mes); 
            const valoresReais = dadosFiltrados.map(ln => limparNumero(ln['Valor Real']));
            const metas = dadosFiltrados.map(ln => limparNumero(ln.Objetivo));

            const coresBarras = valoresReais.map((valor, index) => {
                const meta = metas[index];
                const t = normalizar(tituloExibicao);
                if (t.includes("ABSENTEISMO") || t.includes("TURNOVER")) {
                    return (valor <= meta || meta === 0) ? '#10b981' : '#ef4444';
                }
                return valor >= meta ? '#10b981' : '#ef4444';
            });

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Realizado', data: valoresReais, backgroundColor: coresBarras, borderRadius: 5 },
                        { label: 'Meta', data: metas, type: 'line', borderColor: '#ffffff', borderWidth: 2, fill: false, pointBackgroundColor: '#ffffff' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        x: { ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }, 150);
    }

    Papa.parse(planilhaDrive + "&t=" + new Date().getTime(), {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            document.getElementById('container-graficos').innerHTML = "";
            
            const config = [
                { chave: "HORAS DE TREINAMENTO", titulo: "HORAS DE TREINAMENTO" },
                { chave: "APROVADOS EM TREINAMENTO", titulo: "APROVADOS EM TREINAMENTO" },
                { chave: "TURNOVER PA", titulo: "TURNOVER PA - 03" },
                { chave: "UNIVERSAL", titulo: "TURNOVER - CÁLCULO UNIVERSAL" },
                { chave: "SOLICITACAO", titulo: "TURNOVER - SOLICITAÇÃO DE DESLIGAMENTOS" },
                { chave: "ABSENTEISMO", titulo: "ABSENTEÍSMO PA - 03" },
                { chave: "RETENCAO", titulo: "RETENÇÃO" },
                { 
                    chave: "VALORIZACAO INTERNA", 
                    titulo: "RETENÇÃO PLANO DE VALORIZAÇÃO INTERNA",
                    info: "<b>N° Movimentações Internas</b> Recrutamento Interno +<br>Recrutamento Direcionado"
                }
            ];

            config.forEach(item => {
                const filtrados = dados.filter(ln => normalizar(ln.Processo).includes(normalizar(item.chave)));
                if (filtrados.length > 0) {
                    criarGrafico(item.titulo, filtrados, item.info || null);
                }
            });
        }
    });
</script>
</body>
</html>
