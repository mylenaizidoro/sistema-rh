<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Integrado - Grupo Coplac</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            padding: 20px;
        }
        h3 { color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; margin-bottom: 10px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 40px; }
        
        .card-link {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, border-color 0.2s;
        }
        .card-link:hover {
            transform: translateY(-3px);
            border-color: #38bdf8;
        }
        .icon {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 20px;
        }
        .info { text-align: left; flex-grow: 1; }
        .info span { display: block; font-weight: bold; font-size: 1.1rem; }
        .info small { color: #94a3b8; }
        .arrow { color: #38bdf8; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Grupo Coplac</h3>
        <h1>Sistema Integrado</h1>
        <p>RH e DHO — selecione seu perfil para continuar</p>

        <a href="dashboard.html" class="card-link">
            <div class="icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">A</div>
            <div class="info">
                <span>Ada</span>
                <small>DHO - Treinamento e Desenvolvimento</small>
            </div>
            <div class="arrow">→</div>
        </a>

        <a href="#" class="card-link" onclick="alert('Acesso em desenvolvimento para Gestores')">
            <div class="icon" style="background: rgba(99, 102, 241, 0.1); color: #6366f1;">G</div>
            <div class="info">
                <span>Gestor</span>
                <small>Operações / Industrial</small>
            </div>
            <div class="arrow">→</div>
        </a>
    </div>

</body>
</html>
