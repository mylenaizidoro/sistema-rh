<script>
    const csvUrl = 'dados.csv';

    // FUNÇÃO MÁGICA: Converte "6,45" em "6.45" e remove textos extras
    function formatarParaNumero(valor) {
        if (!valor) return 0;
        // Remove tudo que não é número, vírgula ou ponto
        let apenasNumeros = valor.toString().replace(/[^\d,.-]/g, '');
        // Troca a vírgula brasileira pelo ponto americano
        let numeroFinal = apenasNumeros.replace(',', '.');
        return parseFloat(numeroFinal) || 0;
    }

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true, // Pula aquelas linhas vazias (8 e 15) da sua foto
        complete: function(results) {
            const dados = results.data;
            
            // Filtra o processo da Ada (ignora se é maiúsculo ou minúsculo)
            const treinoData = dados.filter(item => {
                const proc = (item.Processo || "").toUpperCase();
                return proc.includes("TREINAMENTO");
            });

            if (treinoData.length === 0) {
                console.error("Dados de Treinamento não encontrados. Verifique a coluna 'Processo'");
                return;
            }

            const meses = treinoData.map(item => item.Mês);
            const reais = treinoData.map(item => formatarParaNumero(item['Valor Real']));
            const metas = treinoData.map(item => formatarParaNumero(item.Objetivo));

            const ctx = document.getElementById('graficoDHO').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: meses,
                    datasets: [
                        {
                            label: 'Horas Realizadas',
                            data: reais,
                            backgroundColor: '#38bdf8',
                            borderRadius: 5
                        },
                        {
                            label: 'Meta (Objetivo)',
                            data: metas,
                            type: 'line',
                            borderColor: '#ef4444',
                            borderWidth: 2,
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: { ticks: { color: '#94a3b8' } }
                    },
                    plugins: { legend: { labels: { color: '#f1f5f9' } } }
                }
            });
        }
    });
</script>
