<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DHO — Gestão de Indicadores</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        /* Estilo Dark Mode Premium */
        body { 
            background-color: #0f1113; 
            color: #ffffff; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            padding: 40px; 
            margin: 0; 
        }

        .page-container { max-width: 1100px; margin: auto; }

        /* Cabeçalho */
        .header-section { margin-bottom: 40px; }
        .header-top { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .icon-box { background: #1e293b; padding: 10px; border-radius: 12px; display: flex; align-items: center; }
        h1 { font-size: 2.2rem; font-weight: 700; margin: 0; letter-spacing: -1px; }
        .subtitle { color: #94a3b8; font-size: 1.1rem; }

        /* Grid de Cards */
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }

        /* Estilo dos Cards Baseado na Imagem */
        .kpi-card { 
            background: #16181a; 
            border-radius: 24px; 
            padding: 24px; 
            border: 1px solid #26292b;
            transition: transform 0.2s;
        }

        .kpi-title { 
            color: #94a3b8; 
            font-size: 0.85rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .kpi-value-container { display: flex; align-items: baseline; gap: 15px; }
        .kpi-value { font-size: 2.5rem; font-weight: 700; color: #ffffff; }
        
        /* Badge de Tendência */
        .trend-badge { 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.9rem; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 5px;
        }
        .trend-up { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .trend-down { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        /* Container do Gráfico */
        .chart-card { 
            background: #16181a; 
            border-radius: 24px; 
            padding: 30px; 
            border: 1px solid #26292b; 
            margin-top: 20px;
        }
        .chart-container { height: 350px; width: 100%; position: relative; }

        .info-detail {
            margin-top: 20px;
            padding: 15px;
            background: #1e293b;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

<div class="page-container">
    <div class="header-section">
        <div class="header-top">
            <div class="icon-box">🏢</div>
            <h1>DHO — Treinamento & Desenvolvimento</h1>
        </div>
        <p class="subtitle">Indicadores automáticos e trilhas por cargo (protótipo).</p>
    </div>

    <div id="kpi-grid" class="dashboard-grid"></div>
    <div id="charts-main"></div>
</div>

<script>
    Chart.register(ChartDataLabels);

    const planilhaDrive = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?output=csv";

    function limparNumero(v) {
        if (!v || v.toString().trim() === "") return 0;
        let n = v.toString().replace(/\s/g, '').replace(',', '.');
        return parseFloat(n) || 0;
    }

    function normalizar(txt) {
        return txt ? txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : "";
    }

    // Função para criar o Card de Destaque (Igual à imagem)
    function criarKpiCard(titulo, valor, tendencia, sulfixo = "") {
        const grid = document.getElementById('kpi-grid');
        const trendClass = tendencia >= 0 ? 'trend-up' : 'trend-down';
        const trendIcon = tendencia >= 0 ? '↗' : '↘';

        grid.innerHTML += `
            <div class="kpi-card">
                <div class="kpi-title">${titulo}</div>
                <div class="kpi-value-container">
                    <div class="kpi-value">${valor}${sulfixo}</div>
                    <div class="trend-badge ${trendClass}">
                        ${trendIcon} ${Math.abs(tendencia)}%
                    </div>
                </div>
            </div>
        `;
    }

    function criarGraficoDark(titulo, dadosFiltrados, nota) {
        const container = document.getElementById('charts-main');
        const id = 'ch-' + Math.random().toString(36).substr(2, 5);

        container.innerHTML += `
            <div class="chart-card">
                <div class="kpi-title">${titulo}</div>
                <div class="chart-container"><canvas id="${id}"></canvas></div>
                ${nota ? `<div class="info-detail"><b>INFO:</b> ${nota}</div>` : ''}
            </div>
        `;

        setTimeout(() => {
            const ctx = document.getElementById(id);
            const labels = [...new Set(dadosFiltrados.map(d => d.mes || d.Mes))];
            const valores = labels.map(m => {
                const r = dadosFiltrados.find(ln => (ln.mes || ln.Mes) === m);
                return limparNumero(r.Qtd || r['Valor Real'] || r['9105']);
            });

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: valores,
                        backgroundColor: '#3b82f6',
                        borderRadius: 8,
                        barThickness: 30
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        datalabels: { color: '#fff', anchor: 'end', align: 'top' }
                    },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#64748b' } },
                        y: { grid: { color: '#26292b' }, ticks: { color: '#64748b' } }
                    }
                }
            });
        }, 100);
    }

    Papa.parse(planilhaDrive, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            
            // Exemplo de criação dos cards de topo com base na sua imagem
            criarKpiCard("HORA-HOMEM DE TREINAMENTO (MÊS)", "1.842,5", 12.4, " h");
            criarKpiCard("META MENSAL (PROGRESSO)", "88", -12, "%");

            // Gerar gráficos principais
            const config = [
                { chave: "Hora-Homem Treinamento", titulo: "Histórico Hora-Homem", nota: "Consolidado de horas realizadas." },
                { chave: "TURNOVER PA", titulo: "Taxa de Turnover", nota: "Colaboradores > 180 dias." }
            ];

            config.forEach(item => {
                let filtrados = dados.filter(ln => normalizar(ln.Processo || ln.indicadores || "").includes(normalizar(item.chave)));
                if (filtrados.length > 0) criarGraficoDark(item.titulo, filtrados, item.nota);
            });
        }
    });
</script>
</body>
</html>
