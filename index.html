<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Core - Dashboard & Recrutamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-item { cursor: pointer; transition: 0.3s; color: #94a3b8; }
        .sidebar-item:hover { background-color: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .active-menu { background-color: #2563eb !important; color: white !important; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.4); }
        .hidden { display: none !important; }
        .card-border-blue { border-bottom: 4px solid #3b82f6; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#0a1629] text-white flex flex-col shadow-2xl z-10">
        <div class="p-6 text-2xl font-bold border-b border-slate-700 flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white w-8 h-8 flex items-center justify-center">R</div> HR Core
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4 text-sm">
            <div id="menu-dashboard" onclick="trocarPagina('dashboard')" class="sidebar-item active-menu p-3 rounded-xl flex items-center gap-3">
                <i class="fas fa-th-large"></i> Command Center
            </div>
            <div id="menu-recrutamento" onclick="trocarPagina('recrutamento')" class="sidebar-item p-3 rounded-xl flex items-center gap-3">
                <i class="fas fa-briefcase"></i> Recrutamento
            </div>
            <div id="menu-triagem" onclick="trocarPagina('triagem')" class="sidebar-item p-3 rounded-xl flex items-center gap-3">
                <i class="fas fa-users"></i> Triagem
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b flex items-center justify-between px-8 shadow-sm">
            <h1 id="titulo-pagina" class="text-xl font-bold text-slate-800">RH Command Center</h1>
            <div class="flex items-center gap-3">
                <div class="text-right">
                    <p class="text-sm font-bold text-slate-800">Mylena Izidoro</p>
                    <p class="text-[10px] text-slate-400 uppercase font-bold text-blue-600">Diretora de RH</p>
                </div>
                <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">MI</div>
            </div>
        </header>

        <div id="pagina-dashboard" class="flex-1 overflow-y-auto p-8">
            <div id="container-cards-gerais" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <h2 class="font-bold text-slate-800 mb-6 text-xs uppercase">Vagas por Setor</h2>
                    <div class="h-[300px]"><canvas id="chartSetor"></canvas></div>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <h2 class="font-bold text-slate-800 mb-6 text-xs uppercase">Alertas Ativos</h2>
                    <div id="lista-alertas-dashboard" class="space-y-4"></div>
                </div>
            </div>
        </div>

        <div id="pagina-recrutamento" class="flex-1 overflow-y-auto p-8 hidden">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-10">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Vagas Abertas</p>
                    <h3 class="text-2xl font-bold text-slate-800">12</h3>
                </div>
                </div>
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                <h2 class="font-bold text-slate-800 mb-6 text-xs uppercase text-center">Funil de Recrutamento</h2>
                <div class="h-[350px]"><canvas id="chartFunilRecrutamento"></canvas></div>
            </div>
        </div>

        <div id="pagina-triagem" class="flex-1 overflow-y-auto p-8 hidden">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-8">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-400 text-[11px] uppercase border-b border-slate-100">
                            <th class="pb-4">Candidato</th>
                            <th class="pb-4">Match Score</th>
                            <th class="pb-4">Skills</th>
                            <th class="pb-4 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-triagem-final"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // ATENÇÃO: Verifique se este link termina com "output=csv"
        const urlPlanilha = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?gid=1728295734&single=true&output=csv";

        function trocarPagina(pagina) {
            document.getElementById('pagina-dashboard').classList.add('hidden');
            document.getElementById('pagina-recrutamento').classList.add('hidden');
            document.getElementById('pagina-triagem').classList.add('hidden');
            
            document.getElementById('menu-dashboard').classList.remove('active-menu');
            document.getElementById('menu-recrutamento').classList.remove('active-menu');
            document.getElementById('menu-triagem').classList.remove('active-menu');

            document.getElementById('pagina-' + pagina).classList.remove('hidden');
            document.getElementById('menu-' + pagina).classList.add('active-menu');
        }

        function carregarDados() {
            Papa.parse(urlPlanilha, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    if (results.data && results.data.length > 0) {
                        console.log("Dados carregados:", results.data);
                        renderizarInterface(results.data);
                    } else {
                        console.error("Planilha vazia ou link incorreto.");
                    }
                }
            });
        }

        function renderizarInterface(dados) {
            // 1. CARDS GERAIS
            const containerCards = document.getElementById('container-cards-gerais');
            const cards = dados.filter(d => d.Tipo && d.Tipo.trim() === "Card");
            containerCards.innerHTML = cards.map(c => `
                <div class="bg-white p-6 rounded-2xl shadow-sm card-border-blue border border-slate-100">
                    <p class="text-slate-400 text-[10px] font-bold uppercase">${c.Rotulo}</p>
                    <h3 class="text-2xl font-bold text-slate-800">${c.Valor}</h3>
                </div>
            `).join('');

            // 2. TABELA DE TRIAGEM
            const tbody = document.getElementById('lista-triagem-final');
            const candidatos = dados.filter(d => d.Tipo && d.Tipo.trim() === "Triagem");
            tbody.innerHTML = candidatos.map(c => {
                const info = c.Valor.split('|');
                return `
                    <tr class="border-b border-slate-50 text-sm">
                        <td class="py-4 font-bold text-slate-700">${c.Rotulo}</td>
                        <td><span class="text-blue-600 font-bold">${info[0] || ''}</span></td>
                        <td><span class="bg-slate-100 px-2 py-1 rounded text-[10px]">${info[1] || ''}</span></td>
                        <td class="text-right text-slate-300"><i class="fas fa-ellipsis-h"></i></td>
                    </tr>
                `;
            }).join('');

            // 3. GRÁFICOS
            gerarGraficoSetor(dados.filter(d => d.Tipo === "Setor"));
            gerarGraficoFunil(dados.filter(d => d.Tipo === "Funil"));
        }

        function gerarGraficoSetor(dadosSetor) {
            const ctx = document.getElementById('chartSetor').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dadosSetor.map(d => d.Rotulo),
                    datasets: [{ data: dadosSetor.map(d => d.Valor), backgroundColor: '#3b82f6', borderRadius: 4 }]
                },
                options: { indexAxis: 'y', plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false }
            });
        }

        function gerarGraficoFunil(dadosFunil) {
            const ctx = document.getElementById('chartFunilRecrutamento').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dadosFunil.map(d => d.Rotulo),
                    datasets: [{ data: dadosFunil.map(d => d.Valor), backgroundColor: '#4f46e5', borderRadius: 10 }]
                },
                options: { plugins: { legend: { display: false } }, maintainAspectRatio: false }
            });
        }

        // Tenta carregar os dados assim que o site abre
        window.onload = carregarDados;
    </script>
</body>
</html>
