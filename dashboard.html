<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard RH - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: #ffffff; border-radius: 16px; padding: 30px; max-width: 1000px; margin: 25px auto; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .grid-info { display: grid; grid-template-columns: 1fr 280px; gap: 25px; align-items: center; }
        .info-box { background: #f1f5f9; padding: 20px; border-radius: 12px; border-left: 5px solid #0284c7; font-size: 0.9rem; line-height: 1.6; color: #475569; }
        .info-box b { color: #0284c7; display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 0.8rem; }
        h1 { color: #0f172a; font-weight: 700; text-align: center; margin-bottom: 30px; text-transform: uppercase; }
        h2 { color: #0284c7; margin: 0; font-size: 1.2rem; text-transform: uppercase; }
        .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 25px; }
        .chart-container { position: relative; height: 420px; width: 100%; }
        .back-btn { color: #64748b; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div style="max-width: 1000px; margin: auto;">
        <a href="index.html" class="back-btn">← Voltar para perfis</a>
        <h1>GESTÃO DE INDICADORES - DHO CURITIBA</h1>
    </div>

    <div id="container-graficos"></div>

<script>
    Chart.register(ChartDataLabels);

    const planilhaDrive = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?output=csv";

    function limparNumero(v) {
        if (!v || v.toString().trim() === "") return 0;
        let n = v.toString().replace(/\s/g, '').replace(',', '.');
        return parseFloat(n) || 0;
    }

    function normalizar(txt) {
        return txt ? txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : "";
    }

    // Função para ordenar os meses corretamente (MM/AAAA)
    function ordenarMeses(labels) {
        return labels.sort((a, b) => {
            const [mesA, anoA] = a.split('/').map(Number);
            const [mesB, anoB] = b.split('/').map(Number);
            return anoA - anoB || mesA - mesB;
        });
    }

    function criarGraficoPerformance(itemConfig, dadosGerais, labelsOrdenados) {
        const container = document.getElementById('container-graficos');
        const idUnique = Math.random().toString(36).substr(2, 9);
        const dadosFiltrados = dadosGerais.filter(ln => normalizar(ln.Processo).includes(normalizar(itemConfig.chave)));

        if (dadosFiltrados.length === 0) return;

        const exibirPorcentagem = itemConfig.chave.includes("ABSENTEISMO") || 
                                 itemConfig.chave.includes("TURNOVER PA") || 
                                 itemConfig.chave.includes("UNIVERSAL") || 
                                 itemConfig.chave.includes("APROVADOS EM TREINAMENTO");

        container.innerHTML += `
            <div class="card">
                <h2>${itemConfig.titulo}</h2>
                <p class="sub">Grupo Coplac | Performance</p>
                <div class="grid-info">
                    <div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div>
                    <div class="info-box"><b>DETALHAMENTO</b> ${itemConfig.nota}</div>
                </div>
            </div>`;
        
        setTimeout(() => {
            const ctx = document.getElementById(`chart-${idUnique}`);
            
            const metas = labelsOrdenados.map(mes => {
                const r = dadosFiltrados.find(ln => ln.mes === mes);
                return r ? limparNumero(r.Objetivo) : 0;
            });

            const dadosDentroMeta = [];
            const dadosForaMeta = [];

            labelsOrdenados.forEach((mes, index) => {
                const entradasMes = dadosFiltrados.filter(ln => ln.mes === mes);
                let valorTotal = 0;
                entradasMes.forEach(e => valorTotal += limparNumero(e['Valor Real'] || e.Qtd));
                
                const meta = metas[index];
                let atingiu = (itemConfig.tipo === "MENOR_MELHOR") ? (valorTotal <= meta) : (valorTotal >= meta);

                if (atingiu) {
                    dadosDentroMeta.push(valorTotal);
                    dadosForaMeta.push(null);
                } else {
                    dadosDentroMeta.push(null);
                    dadosForaMeta.push(valorTotal);
                }
            });

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labelsOrdenados,
                    datasets: [
                        { label: 'Dentro da meta', data: dadosDentroMeta, backgroundColor: '#22c55e', borderRadius: 4, barPercentage: 0.75 },
                        { label: 'Fora da meta', data: dadosForaMeta, backgroundColor: '#ef4444', borderRadius: 4, barPercentage: 0.75 },
                        { label: 'Meta', data: metas, type: 'line', borderColor: '#f97316', borderWidth: 3, fill: false, pointRadius: 4, pointBackgroundColor: '#f97316', datalabels: { display: false } }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' },
                        datalabels: {
                            color: '#0f172a',
                            font: { weight: 'bold', size: 13 },
                            anchor: 'end', align: 'top', offset: 8, rotation: -90,
                            formatter: (val) => (val !== null && val !== 0) ? val.toLocaleString('pt-BR') + (exibirPorcentagem ? '%' : '') : ''
                        }
                    },
                    scales: { 
                        x: { ticks: { rotation: -45, font: { size: 10 } } },
                        y: { beginAtZero: true, grace: '25%', ticks: { callback: function(value) { return value + (exibirPorcentagem ? '%' : ''); } } }
                    }
                }
            });
        }, 150);
    }

    Papa.parse(planilhaDrive + "&t=" + new Date().getTime(), {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            document.getElementById('container-graficos').innerHTML = "";

            // Criar lista única de meses e ordenar cronologicamente
            const todosOsMeses = [...new Set(dados.map(ln => ln.mes))].filter(m => m && m.includes('/'));
            const labelsOrdenados = ordenarMeses(todosOsMeses);

            // 1. ABSENTEISMO
            criarGraficoPerformance({ chave: "ABSENTEISMO", titulo: "ABSENTEÍSMO PA - 03", tipo: "MENOR_MELHOR", nota: "% Absenteísmo: Total de Horas Ausentes / Total de Horas Programadas para Trabalhar." }, dados, labelsOrdenados);
            
            // 2. TURNOVER PA-03
            criarGraficoPerformance({ chave: "TURNOVER PA", titulo: "TURNOVER PA - 03", tipo: "MENOR_MELHOR", nota: "%TurnOver = (Qtde Colaboradores Desligados > 180 Dias / Qtde Colaboradores no Último Dia do Mês) * 100" }, dados, labelsOrdenados);
            
            // 3. TURNOVER CALCULO UNIVERSAL
            criarGraficoPerformance({ chave: "UNIVERSAL", titulo: "TURNOVER - CÁLCULO UNIVERSAL", tipo: "MENOR_MELHOR", nota: "(Admissões + Desligamentos) ÷ 2 ÷ Total de colaboradores x 100" }, dados, labelsOrdenados);

            // 4. ITENS QUE ERAM CONSOLIDADOS
            const itensConsolidados = [
                { chave: "SOLICITACAO DE DESLIGAMENTO 16 A 30", titulo: "TURNOVER - SOLICITAÇÃO DE DESLIGAMENTO 16 A 30 DIAS", nota: "Quantidade total de solicitações entre 16 e 30 dias de casa." },
                { chave: "SOLICITACAO DE DESLIGAMENTO 31 A 90", titulo: "TURNOVER - SOLICITAÇÃO DE DESLIGAMENTO 31 A 90 DIAS", nota: "Quantidade total de solicitações entre 31 e 90 dias de casa." },
                { chave: "SOLICITACAO DE DESLIGAMENTO ACIMA DE 90", titulo: "TURNOVER - SOLICITAÇÃO DE DESLIGAMENTO ACIMA DE 90 DIAS", nota: "Quantidade total de solicitações acima de 90 dias de casa." },
                { chave: "PEDIDOS DE DESLIGAMENTO MES", titulo: "TURNOVER - SOLICITAÇÃO DE DESLIGAMENTO GERAL NO MÊS", nota: "Total de pedidos de desligamento registrados no mês." },
                { chave: "INICIATIVA DE DESLIGAMENTO DA EMPRESA dentro de 15 dias", titulo: "TURNOVER - INICIATIVA EMPRESA ATÉ 15 DIAS", nota: "Desligamentos por iniciativa da empresa até 15 dias." },
                { chave: "INICIATIVA DE DESLIGAMENTO DA EMPRESA dentro de 30 dias", titulo: "TURNOVER - INICIATIVA EMPRESA ATÉ 30 DIAS", nota: "Desligamentos por iniciativa da empresa até 30 dias." },
                { chave: "INICIATIVA DE DESLIGAMENTO DA EMPRESA de 31 a 90 dias", titulo: "TURNOVER - INICIATIVA EMPRESA 31 A 90 DIAS", nota: "Desligamentos por iniciativa da empresa de 31 a 90 dias." },
                { chave: "INICIATIVA DE DESLIGAMENTO DA EMPRESA geral mes", titulo: "TURNOVER - INICIATIVA EMPRESA GERAL NO MÊS", nota: "Total de desligamentos por iniciativa da empresa no mês." }
            ];

            itensConsolidados.forEach(item => {
                criarGraficoPerformance({...item, tipo: "MENOR_MELHOR"}, dados, labelsOrdenados);
            });

            // 5. INDICADORES FINAIS
            criarGraficoPerformance({ chave: "HORAS DE TREINAMENTO", titulo: "HORAS DE TREINAMENTO", tipo: "MAIOR_MELHOR", nota: "Horas de treinamentos programados e realizados no mês." }, dados, labelsOrdenados);
            criarGraficoPerformance({ chave: "APROVADOS EM TREINAMENTO", titulo: "APROVADOS EM TREINAMENTO", tipo: "MAIOR_MELHOR", nota: "%Aprovados em Treinamento = (Qtde Colaboradores Aprovados / Qtde Colaboradores Avaliados) * 100" }, dados, labelsOrdenados);
            criarGraficoPerformance({ chave: "RETENÇÃO PLANO DE VALORIZAÇÃO INTERNA", titulo: "PLANO DE VALORIZAÇÃO INTERNA", tipo: "MAIOR_MELHOR", nota: "Acompanhamento de promoções internas e meritocracia." }, dados, labelsOrdenados);
        }
    });
</script>
</body>
</html>
