<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard RH - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; }
        .card { background: #1e293b; border-radius: 15px; padding: 25px; max-width: 900px; margin: 20px auto; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin: 0; font-size: 1.5rem; text-transform: uppercase; }
        .sub { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
        .chart-container { position: relative; height: 350px; width: 100%; }
        .back-btn { color: #94a3b8; text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div style="max-width: 900px; margin: auto;">
        <a href="index.html" class="back-btn">← Voltar para perfis</a>
        <h1 style="font-size: 1.8rem; margin-bottom: 10px;">Gestão de Indicadores PA-03</h1>
    </div>

    <div id="container-graficos"></div>

<script>
    const planilhaDrive = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?output=csv";

    function limparNumero(v) {
        if (!v || v.toString().trim() === "") return 0;
        let n = v.toString().replace(/\s/g, '').replace(',', '.');
        return parseFloat(n) || 0;
    }

    function normalizar(txt) {
        return txt ? txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : "";
    }

    function criarGraficoComum(grupo, dadosFiltrados) {
        const container = document.getElementById('container-graficos');
        const titulo = grupo === "APROVADOS EM TREINAMENTO" ? "APROVADOS EM TREINAMENTO" : grupo;
        
        container.innerHTML += `
            <div class="card">
                <h2>${titulo}</h2>
                <p class="sub">Análise de Performance | Grupo Coplac</p>
                <div class="chart-container"><canvas id="chart-${normalizar(grupo)}"></canvas></div>
            </div>`;

        setTimeout(() => {
            const ctx = document.getElementById(`chart-${normalizar(grupo)}`);
            const labels = [...new Set(dadosFiltrados.map(ln => ln.Mês))];
            const valoresReais = dadosFiltrados.map(ln => limparNumero(ln['Valor Real']));
            const metas = dadosFiltrados.map(ln => limparNumero(ln.Objetivo));

            const coresBarras = valoresReais.map((valor, index) => {
                const meta = metas[index];
                if (normalizar(grupo).includes("ABSENTEISMO")) {
                    return valor <= meta ? '#10b981' : '#ef4444';
                }
                return valor >= meta ? '#10b981' : '#ef4444';
            });

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Realizado', data: valoresReais, backgroundColor: coresBarras, borderRadius: 5 },
                        { label: 'Meta', data: metas, type: 'line', borderColor: '#ffffff', borderWidth: 2, fill: false }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }, 100);
    }

    function criarGraficoTurnoverEmpilhado(dados) {
        const container = document.getElementById('container-graficos');
        container.innerHTML += `
            <div class="card">
                <h2>TURNOVER (COMPOSIÇÃO)</h2>
                <p class="sub">Iniciativa Empresa vs Solicitação | Grupo Coplac</p>
                <div class="chart-container"><canvas id="chart-turnover-stack"></canvas></div>
            </div>`;

        setTimeout(() => {
            const ctx = document.getElementById('chart-turnover-stack');
            const meses = [...new Set(dados.map(ln => ln.Mês))];
            
            const dadosEmpresa = meses.map(mes => {
                const ln = dados.find(d => d.Mês === mes && normalizar(d.Processo).includes("INICIATIVA"));
                return ln ? limparNumero(ln['Valor Real']) : 0;
            });

            const dadosPedido = meses.map(mes => {
                const ln = dados.find(d => d.Mês === mes && normalizar(d.Processo).includes("SOLICITACOES"));
                return ln ? limparNumero(ln['Valor Real']) : 0;
            });

            const totalTendencia = dadosEmpresa.map((v, i) => v + dadosPedido[i]);

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: meses,
                    datasets: [
                        { label: 'Iniciativa Empresa', data: dadosEmpresa, backgroundColor: '#ef4444', stack: 'stack1' },
                        { label: 'Pedido de Demissão', data: dadosPedido, backgroundColor: '#6366f1', stack: 'stack1' },
                        { label: 'Total (Tendência)', data: totalTendencia, type: 'line', borderColor: '#38bdf8', borderWidth: 3, fill: false, tension: 0.3 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { x: { stacked: true }, y: { stacked: true } }
                }
            });
        }, 100);
    }

    Papa.parse(planilhaDrive + "&t=" + new Date().getTime(), {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            document.getElementById('container-graficos').innerHTML = "";
            
            // Gráfico Empilhado de Turnover
            const dadosTurnover = dados.filter(ln => normalizar(ln.Processo).includes("TURNOVER"));
            if (dadosTurnover.length) criarGraficoTurnoverEmpilhado(dadosTurnover);

            // Outros Gráficos
            const outros = ["ABSENTEISMO", "APROVADOS EM TREINAMENTOS", "RETENCAO"];
            outros.forEach(grupo => {
                const filtrados = dados.filter(ln => normalizar(ln.Processo).includes(grupo));
                if (filtrados.length) criarGraficoComum(grupo, filtrados);
            });
        }
    });
</script>
</body>
</html>
