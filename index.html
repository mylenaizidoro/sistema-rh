<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RH Dashboard - Dados Reais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-slate-100 p-10">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">Vagas Abertas por Setor</h1>
        <canvas id="chartSetor"></canvas>
        <p class="text-sm text-slate-400 mt-4 text-center italic">Os dados acima estão sendo lidos do arquivo dados.csv</p>
    </div>

    <script>
        function carregarDadosDoExcel() {
            // O código busca o arquivo dados.csv no seu GitHub
            Papa.parse("dados.csv", {
                download: true,
                header: true,
                complete: function(results) {
                    const dadosExcel = results.data;
                    
                    // Separa os nomes dos setores e os números
                    const nomesSetores = dadosExcel.map(item => item.Setor);
                    const quantidades = dadosExcel.map(item => item.Vagas);

                    gerarGrafico(nomesSetores, quantidades);
                }
            });
        }

        function gerarGrafico(labels, valores) {
            new Chart(document.getElementById('chartSetor'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Quantidade de Vagas',
                        data: valores,
                        backgroundColor: '#8b5cf6',
                        borderRadius: 8
                    }]
                },
                options: {
                    indexAxis: 'y',
                    plugins: { legend: { display: false } }
                }
            });
        }

        // Inicia a leitura ao abrir o site
        carregarDadosDoExcel();
    </script>
</body>
</html>
