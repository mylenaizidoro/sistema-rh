<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard DHO - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; }
        .card { background: #1e293b; border-radius: 15px; padding: 25px; max-width: 900px; margin: auto; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin: 0; }
        .chart-container { position: relative; height: 400px; width: 100%; margin-top: 20px; }
        .back-btn { color: #94a3b8; text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="card">
        <a href="index.html" class="back-btn">← Voltar para perfis</a>
        <h2>Indicadores de DHO</h2>
        <p style="color: #94a3b8;">Gestão de Treinamento e Desenvolvimento - Grupo Coplac</p>
        <div class="chart-container"><canvas id="graficoDHO"></canvas></div>
    </div>

<script>
    Papa.parse("dados.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const dados = results.data;
            
            // Filtra as linhas que contêm TREINAMENTO
            const treinoData = dados.filter(ln => 
                ln.Processo && ln.Processo.toUpperCase().includes("TREINAMENTO")
            );

            const meses = treinoData.map(ln => ln.Mês || ln.Mes); 
            const reais = treinoData.map(ln => {
                let v = ln['Valor Real'] || "0";
                return parseFloat(v.toString().replace(',', '.')) || 0;
            }); 
            const metas = treinoData.map(ln => {
                let m = ln.Objetivo || "0";
                return parseFloat(m.toString().replace(',', '.')) || 0;
            }); 

            new Chart(document.getElementById('graficoDHO'), {
                type: 'bar',
                data: {
                    labels: meses,
                    datasets: [
                        { label: 'Horas Realizadas', data: reais, backgroundColor: '#38bdf8', borderRadius: 5 },
                        { label: 'Meta', data: metas, type: 'line', borderColor: '#ef4444', borderWidth: 3, fill: false }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        x: { ticks: { color: '#94a3b8' } }
                    },
                    plugins: { legend: { labels: { color: '#f1f5f9' } } }
                }
            });
        }
    });
</script>
</body>
</html>
