<script>
    // 1. EIXO X: Todos os meses da sua planilha
    const mesesLabels = [
        '02/25', '03/25', '04/25', '05/25', '06/25', '07/25', 
        '08/25', '09/25', '10/25', '11/25', '12/25', '01/26', '02/26'
    ];
    
    // 2. DADOS TURNOVER: Valores da linha 3 da planilha
    const dadosTurnover = [
        3.04, 6.40, 4.34, 3.70, 2.27, 2.90, 
        3.06, 3.91, 3.49, 3.31, 3.06, 3.82, 3.23
    ];
    
    // 3. DADOS ABSENTEÍSMO: Valores da linha 7 da planilha
    const dadosAbsenteismo = [
        3.41, 4.35, 4.65, 4.61, 4.84, 3.96, 
        4.88, 5.16, 5.01, 4.49, 5.97, 3.38, 3.33
    ];

    const ctx = document.getElementById('graficoEvolucao').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: mesesLabels,
            datasets: [
                {
                    label: 'Turnover %',
                    data: dadosTurnover,
                    borderColor: '#ef4444', // Vermelho
                    backgroundColor: '#ef444411',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 4,
                    borderWidth: 3
                },
                {
                    label: 'Absenteísmo %',
                    data: dadosAbsenteismo,
                    borderColor: '#3b82f6', // Azul
                    backgroundColor: 'transparent',
                    fill: false,
                    tension: 0.4,
                    pointRadius: 4,
                    borderWidth: 3,
                    borderDash: [5, 5] // Linha tracejada para diferenciar
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { 
                    position: 'bottom',
                    labels: { boxWidth: 20, font: { size: 12, weight: 'bold' } }
                },
                tooltip: {
                    backgroundColor: '#1e293b',
                    padding: 12,
                    bodyFont: { size: 14 },
                    callbacks: {
                        label: function(context) {
                            return context.dataset.label + ': ' + context.raw.toFixed(2) + '%';
                        }
                    }
                }
            },
            scales: {
                x: {
                    grid: { display: false },
                    ticks: { font: { size: 10, weight: 'bold' } }
                },
                y: { 
                    beginAtZero: true,
                    suggestedMax: 7,
                    title: { display: true, text: 'Percentual (%)', font: { weight: 'bold' } },
                    ticks: { callback: value => value + '%' }
                }
            }
        }
    });
</script>
