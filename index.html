<script>
    const urlPlanilha = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?gid=1728295734&single=true&output=csv";
    let charts = {};

    function trocarPagina(pagina) {
        const paginas = ['dashboard', 'vagas', 'triagem'];
        paginas.forEach(p => {
            document.getElementById(`pagina-${p}`).classList.add('hidden');
            document.getElementById(`menu-${p}`).classList.remove('active-menu');
        });

        document.getElementById(`pagina-${pagina}`).classList.remove('hidden');
        document.getElementById(`menu-${pagina}`).classList.add('active-menu');
        
        const titulos = { 'dashboard': 'RH Command Center', 'vagas': 'Gestão de Vagas', 'triagem': 'Triagem de Candidatos' };
        document.getElementById('titulo-pagina').innerText = titulos[pagina];
    }

    function carregarDados() {
        Papa.parse(urlPlanilha, {
            download: true, 
            header: true, 
            skipEmptyLines: true,
            complete: function(results) {
                if (results.data) {
                    const dados = results.data.map(d => ({
                        Tipo: d.Tipo ? d.Tipo.trim() : "",
                        Rotulo: d.Rotulo ? d.Rotulo.trim() : "",
                        Valor: d.Valor ? d.Valor.trim() : ""
                    }));

                    // 1. Renderiza o Painel Principal
                    renderizarDashboard(dados);

                    // 2. Filtra e Renderiza as Vagas (Baseado na sua nova planilha)
                    const listaVagas = dados.filter(d => d.Tipo === "Vagas");
                    renderizarVagas(listaVagas);

                    // 3. Renderiza a Triagem
                    renderizarTriagem(dados.filter(d => d.Tipo === "Triagem"));
                }
            }
        });
    }

    function renderizarVagas(vagas) {
        const tbody = document.getElementById('tabela-vagas-corpo');
        
        // Mapeamento manual conforme sua planilha (VAG-001, VAG-002, VAG-003)
        // Isso garante que cada vaga pegue seu respectivo Cargo, Setor e Status
        const setoresMap = { "VAG-001": "Produção", "VAG-002": "Logística", "VAG-003": "Tecnologia" };
        const statusMap = { "VAG-001": "aberta", "VAG-002": "processo", "VAG-003": "aberta" };

        tbody.innerHTML = vagas.map(v => {
            const codigo = v.Rotulo; // VAG-001, etc
            const cargo = v.Valor;   // Analista de Produção, etc
            const setor = setoresMap[codigo] || "Geral";
            const status = statusMap[codigo] || "aberta";

            return `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                    <td class="px-8 py-5 text-blue-600 font-bold text-xs">${codigo}</td>
                    <td class="px-4 py-5 font-bold text-slate-800">${cargo}</td>
                    <td class="px-4 py-5 text-slate-500">${setor}</td>
                    <td class="px-4 py-5">
                        <span class="badge-${status}">${status}</span>
                    </td>
                    <td class="px-8 py-5 text-right">
                        <div class="flex justify-end gap-3 text-slate-300">
                            <i class="fas fa-edit cursor-pointer hover:text-blue-500"></i>
                            <i class="fas fa-ellipsis-h cursor-pointer"></i>
                        </div>
                    </td>
                </tr>`;
        }).join('');
    }

    function renderizarDashboard(dados) {
        // Cards de topo
        const cards = dados.filter(d => d.Tipo === "Card");
        document.getElementById('container-cards').innerHTML = cards.map(c => `
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 card-border-blue">
                <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">${c.Rotulo}</p>
                <h3 class="text-2xl font-bold text-slate-800">${c.Valor}</h3>
            </div>`).join('');
        
        // Gráficos
        criarGrafico('chartSetor', 'bar', dados.filter(d => d.Tipo === "Setor"), true);
        criarGrafico('chartLinha', 'line', dados.filter(d => d.Tipo === "Linha"), false);
        criarGrafico('chartFunil', 'bar', dados.filter(d => d.Tipo === "Funil"), true);

        // Alertas
        const alertas = dados.filter(d => d.Tipo === "Alerta");
        document.getElementById('cont-alertas').innerText = `${alertas.length} ATIVOS`;
        document.getElementById('lista-alertas').innerHTML = alertas.map(a => `
            <div class="p-4 bg-orange-50 rounded-2xl flex gap-4 items-start border border-orange-100">
                <div class="bg-white p-2 rounded-lg text-orange-500 shadow-sm"><i class="fas fa-exclamation-circle text-xs"></i></div>
                <div>
                    <p class="text-[11px] font-bold text-slate-800">${a.Rotulo}</p>
                    <p class="text-[10px] text-slate-500 font-semibold uppercase">${a.Valor}</p>
                </div>
            </div>`).join('');
    }

    function renderizarTriagem(candidatos) {
        const tbody = document.getElementById('lista-triagem');
        tbody.innerHTML = candidatos.map(c => {
            const partes = c.Valor.split('|').map(p => p.trim());
            const score = partes[0] || "0%";
            const status = partes[2] || "Triagem";
            const iniciais = c.Rotulo.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
            
            return `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                    <td class="py-4 flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center text-blue-600 font-bold text-xs">${iniciais}</div>
                        <span class="font-semibold text-slate-800 text-sm">${c.Rotulo}</span>
                    </td>
                    <td>
                        <div class="flex items-center gap-3">
                            <div class="w-32 h-2 bg-slate-100 rounded-full overflow-hidden">
                                <div class="bg-blue-600 h-full" style="width: ${score}"></div>
                            </div>
                            <span class="font-bold text-slate-700 text-xs">${score}</span>
                        </div>
                    </td>
                    <td><span class="bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full font-bold text-[9px] uppercase">${status}</span></td>
                    <td class="text-right"><i class="fas fa-ellipsis-h text-slate-300"></i></td>
                </tr>`;
        }).join('');
    }

    function criarGrafico(id, tipo, dFiltrado, isHorizontal) {
        const canvas = document.getElementById(id);
        if (!canvas) return;
        if (charts[id]) charts[id].destroy();
        charts[id] = new Chart(canvas.getContext('2d'), {
            type: tipo,
            data: {
                labels: dFiltrado.map(d => d.Rotulo),
                datasets: [{
                    data: dFiltrado.map(d => d.Valor.replace('%', '').replace(',', '.')),
                    backgroundColor: '#4f46e5',
                    borderRadius: 6,
                    barThickness: 20
                }]
            },
            options: {
                indexAxis: isHorizontal ? 'y' : 'x',
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { font: { size: 10 } } },
                    y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 } } }
                }
            }
        });
    }

    carregarDados();
</script>
