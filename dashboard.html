<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard RH - Grupo Coplac</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: #ffffff; border-radius: 16px; padding: 30px; max-width: 1000px; margin: 25px auto; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); page-break-inside: avoid; }
        .grid-info { display: grid; grid-template-columns: 1fr 280px; gap: 25px; align-items: center; }
        .info-box { background: #f1f5f9; padding: 20px; border-radius: 12px; border-left: 5px solid #0284c7; font-size: 0.9rem; line-height: 1.6; color: #475569; }
        .info-box b { color: #0284c7; display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 0.8rem; }
        h1 { color: #0f172a; font-weight: 700; text-align: center; margin-bottom: 20px; text-transform: uppercase; }
        h2 { color: #0284c7; margin: 0; font-size: 1.2rem; text-transform: uppercase; }
        .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 25px; }
        .chart-container { position: relative; height: 420px; width: 100%; }
        .back-btn { color: #64748b; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 20px; }

        /* Estilos dos Novos Controles */
        .controls { text-align: center; margin-bottom: 30px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 8px 16px; border: 1px solid #0284c7; background: white; color: #0284c7; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn.active { background: #0284c7; color: white; }
        .btn:hover { background: #e0f2fe; }
        .btn-pdf { background: #0f172a; color: white; border-color: #0f172a; margin-left: 20px; }
        .btn-pdf:hover { background: #334155; color: white; }

        /* Ajustes para Impressão/PDF */
        @media print {
            .controls, .back-btn, .btn { display: none !important; }
            body { background-color: white; padding: 0; }
            .card { box-shadow: none; border: 1px solid #eee; margin: 10px auto; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div style="max-width: 1000px; margin: auto;">
        <a href="index.html" class="back-btn">← Voltar para perfis</a>
        <h1>GESTÃO DE INDICADORES - DHO CURITIBA</h1>
        
        <div class="controls">
            <button class="btn active" onclick="filtrarAno('TODOS', this)">Ver Todos</button>
            <button class="btn" onclick="filtrarAno('2025', this)">2025</button>
            <button class="btn" onclick="filtrarAno('2026', this)">2026</button>
            <button class="btn btn-pdf" onclick="window.print()">Exportar PDF</button>
        </div>
    </div>

    <div id="container-graficos"></div>

<script>
    Chart.register(ChartDataLabels);

    const planilhaDrive = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrXO0btL1oimgW_DDA7OZHFb-eZqkt_x66Z6phMPNtKMlKAKq7IGuDbIisw4TPyK76OZ1sC8YVTux4/pub?output=csv";

    let dadosGlobais = [];
    let filtroAnoAtual = 'TODOS';

    const labelsFull = [];
    for(let m=1; m<=12; m++) labelsFull.push(`${m.toString().padStart(2,'0')}/2025`);
    for(let m=1; m<=12; m++) labelsFull.push(`${m.toString().padStart(2,'0')}/2026`);

    function limparNumero(v) {
        if (!v || v.toString().trim() === "") return 0;
        let n = v.toString().replace(/\s/g, '').replace(',', '.');
        return parseFloat(n) || 0;
    }

    function normalizar(txt) {
        return txt ? txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : "";
    }

    function filtrarAno(ano, elemento) {
        filtroAnoAtual = ano;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        elemento.classList.add('active');
        renderizarDashboard();
    }

    function criarGraficoPerformance(itemConfig, dadosGerais) {
        const container = document.getElementById('container-graficos');
        const idUnique = Math.random().toString(36).substr(2, 9);
        const dadosFiltrados = dadosGerais.filter(ln => normalizar(ln.Processo).includes(normalizar(itemConfig.chave)));

        if (dadosFiltrados.length === 0) return;

        const labelsExibicao = filtroAnoAtual === 'TODOS' ? labelsFull : labelsFull.filter(l => l.includes(filtroAnoAtual));

        const exibirPorcentagem = itemConfig.chave.includes("ABSENTEISMO") || 
                                 itemConfig.chave.includes("TURNOVER PA") || 
                                 itemConfig.chave.includes("UNIVERSAL") || 
                                 itemConfig.chave.includes("APROVADOS EM TREINAMENTO");

        container.innerHTML += `
            <div class="card">
                <h2>${itemConfig.titulo}</h2>
                <p class="sub">Grupo Coplac | Performance</p>
                <div class="grid-info">
                    <div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div>
                    <div class="info-box"><b>DETALHAMENTO</b> ${itemConfig.nota}</div>
                </div>
            </div>`;
        
        setTimeout(() => {
            const ctx = document.getElementById(`chart-${idUnique}`);
            const metas = labelsExibicao.map(mes => limparNumero(dadosFiltrados.find(ln => ln.mes === mes)?.Objetivo));
            const dDentro = []; const dFora = [];

            labelsExibicao.forEach((mes, idx) => {
                const r = dadosFiltrados.find(ln => ln.mes === mes);
                const valor = r ? limparNumero(r['Valor Real'] || r.Qtd) : null;
                const meta = metas[idx];
                
                if (valor !== null) {
                    let atingiu = (itemConfig.tipo === "MENOR_MELHOR") ? (valor <= meta) : (valor >= meta);
                    if (atingiu) { dDentro.push(valor); dFora.push(null); }
                    else { dDentro.push(null); dFora.push(valor); }
                } else { dDentro.push(null); dFora.push(null); }
            });

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labelsExibicao,
                    datasets: [
                        { label: 'Dentro da meta', data: dDentro, backgroundColor: '#22c55e', borderRadius: 4 },
                        { label: 'Fora da meta', data: dFora, backgroundColor: '#ef4444', borderRadius: 4 },
                        { label: 'Meta', data: metas, type: 'line', borderColor: '#f97316', borderWidth: 3, pointRadius: 4, datalabels: { display: false } }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: (context) => `Valor: ${context.raw}${exibirPorcentagem ? '%' : ''} (Meta: ${metas[context.dataIndex]}${exibirPorcentagem ? '%' : ''})`
                            }
                        },
                        datalabels: {
                            color: '#0f172a', font: { weight: 'bold' }, anchor: 'end', align: 'top', offset: 8, rotation: -90,
                            formatter: (v) => (v !== null) ? v.toLocaleString('pt-BR') + (exibirPorcentagem ? '%' : '') : ''
                        }
                    },
                    scales: { y: { beginAtZero: true, grace: '30%' } }
                }
            });
        }, 150);
    }

    function criarGraficoConsolidado(titulo, dadosMOD, dadosMOI) {
        const container = document.getElementById('container-graficos');
        const idUnique = Math.random().toString(36).substr(2, 9);
        const labelsExibicao = filtroAnoAtual === 'TODOS' ? labelsFull : labelsFull.filter(l => l.includes(filtroAnoAtual));

        container.innerHTML += `
            <div class="card">
                <h2>${titulo}</h2>
                <p class="sub">Grupo Coplac | Unificado</p>
                <div class="grid-info">
                    <div class="chart-container"><canvas id="chart-${idUnique}"></canvas></div>
                    <div class="info-box"><b>DETALHAMENTO</b> Comparativo entre MOD e MOI.</div>
                </div>
            </div>`;
        
        setTimeout(() => {
            const vMOD = labelsExibicao.map(m => limparNumero(dadosMOD.find(ln => ln.mes === m)?.['Valor Real'] || dadosMOD.find(ln => ln.mes === m)?.Qtd));
            const vMOI = labelsExibicao.map(m => limparNumero(dadosMOI.find(ln => ln.mes === m)?.['Valor Real'] || dadosMOI.find(ln => ln.mes === m)?.Qtd));
            const meta = labelsExibicao.map(m => limparNumero((dadosMOD.find(ln => ln.mes === m) || dadosMOI.find(ln => ln.mes === m))?.Objetivo));

            new Chart(document.getElementById(`chart-${idUnique}`), {
                type: 'bar',
                data: {
                    labels: labelsExibicao,
                    datasets: [
                        { label: 'MOI', data: vMOI, backgroundColor: '#cbd5e1', stack: 's1' },
                        { label: 'MOD', data: vMOD, backgroundColor: '#475569', stack: 's1' },
                        { label: 'Meta', data: meta, type: 'line', borderColor: '#f97316', borderWidth: 2, datalabels: { display: false } }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        tooltip: { mode: 'index', intersect: false },
                        datalabels: { color: '#fff', formatter: (v) => v > 0 ? v : '', anchor: 'center', align: 'center' }
                    },
                    scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } }
                }
            });
        }, 150);
    }

    function renderizarDashboard() {
        document.getElementById('container-graficos').innerHTML = "";
        
        criarGraficoPerformance({ chave: "ABSENTEISMO", titulo: "ABSENTEÍSMO PA - 03", tipo: "MENOR_MELHOR", nota: "% Absenteísmo: Ausentes / Programadas." }, dadosGlobais);
        criarGraficoPerformance({ chave: "TURNOVER PA", titulo: "TURNOVER PA - 03", tipo: "MENOR_MELHOR", nota: "%TurnOver (Desligados > 180 Dias)." }, dadosGlobais);
        criarGraficoPerformance({ chave: "UNIVERSAL", titulo: "TURNOVER - CÁLCULO UNIVERSAL", tipo: "MENOR_MELHOR", nota: "Fórmula Universal de Rotatividade." }, dadosGlobais);

        const consolidados = [
            { termo: "SOLICITACAO DE DESLIGAMENTO 16 A 30", titulo: "TURNOVER - SOLICITAÇÃO 16 A 30 DIAS" },
            { termo: "PEDIDOS DE DESLIGAMENTO MES", titulo: "TURNOVER - SOLICITAÇÃO GERAL NO MÊS" },
            { termo: "INICIATIVA DE DESLIGAMENTO DA EMPRESA geral mes", titulo: "TURNOVER - INICIATIVA EMPRESA GERAL" }
        ];

        consolidados.forEach(p => {
            const dMOD = dadosGlobais.filter(ln => normalizar(ln.Processo).includes(normalizar(p.termo)) && normalizar(ln.Indicador) === "MOD");
            const dMOI = dadosGlobais.filter(ln => normalizar(ln.Processo).includes(normalizar(p.termo)) && normalizar(ln.Indicador) === "MOI");
            if (dMOD.length || dMOI.length) criarGraficoConsolidado(p.titulo, dMOD, dMOI);
        });

        criarGraficoPerformance({ chave: "HORAS DE TREINAMENTO", titulo: "HORAS DE TREINAMENTO", tipo: "MAIOR_MELHOR", nota: "Horas de treinamento realizadas." }, dadosGlobais);
        criarGraficoPerformance({ chave: "APROVADOS EM TREINAMENTO", titulo: "APROVADOS EM TREINAMENTO", tipo: "MAIOR_MELHOR", nota: "% de aprovação técnica." }, dadosGlobais);
        criarGraficoPerformance({ chave: "RETENÇÃO PLANO DE VALORIZAÇÃO INTERNA", titulo: "PLANO DE VALORIZAÇÃO INTERNA", tipo: "MAIOR_MELHOR", nota: "Acompanhamento de promoções." }, dadosGlobais);
    }

    Papa.parse(planilhaDrive + "&t=" + new Date().getTime(), {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            dadosGlobais = results.data;
            renderizarDashboard();
        }
    });
</script>
</body>
</html>
