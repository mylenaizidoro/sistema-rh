<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Indicadores - Coplac Curitiba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .card-meta { border-top: 4px solid #ef4444; transition: transform 0.2s; }
        .card-meta:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-slate-100 p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="bg-white p-6 rounded-2xl shadow-sm mb-8">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">Painel de Indicadores - DHO + RH</h1>
                    <p class="text-emerald-600 font-bold text-sm mt-1">Acesso Restrito: Dados Confidenciais de RH</p>
                </div>
                <button onclick="window.location.reload()" class="bg-slate-100 p-2 rounded-lg hover:bg-slate-200">
                    <i class="fas fa-sync-alt text-slate-600"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm card-meta">
                <p class="text-slate-400 text-[10px] font-bold uppercase">Turnover Acumulado</p>
                <h3 class="text-3xl font-bold text-slate-800">3,23%</h3>
                <p class="text-emerald-500 text-xs mt-2 font-bold"><i class="fas fa-caret-down"></i> Abaixo da Meta (4,0%)</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm card-meta" style="border-color: #3b82f6;">
                <p class="text-slate-400 text-[10px] font-bold uppercase">Absenteísmo Médio</p>
                <h3 class="text-3xl font-bold text-slate-800">3,33%</h3>
                <p class="text-emerald-500 text-xs mt-2 font-bold"><i class="fas fa-check"></i> Meta Atingida</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm card-meta" style="border-color: #10b981;">
                <p class="text-slate-400 text-[10px] font-bold uppercase">Horas de Treinamento</p>
                <h3 class="text-3xl font-bold text-slate-800">545h</h3>
                <p class="text-blue-500 text-xs mt-2 font-bold"><i class="fas fa-plus"></i> 115h acima da meta</p>
            </div>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm">
            <h4 class="text-slate-700 font-bold mb-6 italic">Evolução dos Indicadores - Últimos Meses</h4>
            <div class="h-[400px]">
                <canvas id="meuGrafico"></canvas>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('meuGrafico').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Out/25', 'Nov/25', 'Dez/25', 'Jan/26', 'Fev/26'],
                datasets: [{
                    label: 'Turnover %',
                    data: [3.49, 3.31, 3.08, 3.82, 3.23],
                    borderColor: '#ef4444',
                    backgroundColor: '#ef444422',
                    fill: true,
                    tension: 0.4
                }, {
                    label: 'Absenteísmo %',
                    data: [5.01, 4.49, 5.97, 3.38, 3.33],
                    borderColor: '#3b82f6',
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } }
            }
        });
    </script>
</body>
</html>
